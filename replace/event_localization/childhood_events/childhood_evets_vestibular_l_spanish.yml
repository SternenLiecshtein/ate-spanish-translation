l_spanish:

 imperial_bureaucracy.0010.t:0 "¡El día del Vestibular!"
 imperial_bureaucracy.0010.desc:0 "Ha llegado el momento de enfrentarme al temido Vestibular, los exámenes estandarizados que pondrán a prueba mi comprensión de la burocracia estatal brasileña. Dependiendo de mis calificaciones, este podría ser mi primer paso en el servicio civil imperial o, por el contrario, podría significar que tendré un camino mucho más difícil para seguir una carrera política..."
 imperial_bureaucracy.0010.a:0 "Espero haber hincado los codos lo suficiente anoche..."
 imperial_bureaucracy.0010.b:0 "El Vestibular no es para mí."

 imperial_bureaucracy.0014.t:0 "¿¡He Fracasado!?"
 imperial_bureaucracy.0014.desc:0 "A pesar de tus mejores esfuerzos, has reprobado el examen del Vestibular."
 imperial_bureaucracy.0014.a:0 "Hay más en la vida que ser un simple burócrata... ¿verdad?"

 imperial_bureaucracy.0015.t:0 "Aprobado por los pelos"
 imperial_bureaucracy.0015.desc:0 "Has logrado pasar raspando el examen del Vestibular con una nota mínima. Menos da una piedra, ¿eh?"
 imperial_bureaucracy.0015.a:0 "Menos mal que no encontraron mi pequeña chuleta."

 imperial_bureaucracy.0016.t:0 "Un aprobado"
 imperial_bureaucracy.0016.desc:0 "Has aprobado el Vestibular con una nota respetable, demostrando un conocimiento de Brasil que te será de gran utilidad en el futuro."
 imperial_bureaucracy.0016.a:0 "Por fin ha terminado."

 imperial_bureaucracy.0017.t:0 "Una nota muy buena"
 imperial_bureaucracy.0017.desc:0 "Te ha ido muy bien en el examen del Vestibular, lo que te garantiza una buena posición en la burocracia brasileña."
 imperial_bureaucracy.0017.a:0 "Todo ese estudio valió la pena."

 imperial_bureaucracy.0018.t:0 "Más allá del deber"
 imperial_bureaucracy.0018.desc:0 "No solo has aprobado el Vestibular, ¡sino que parece que has obtenido una de las puntuaciones más altas de todo Brasil!"
 imperial_bureaucracy.0018.a:0 "Creo que necesito sentarme un momento."