l_spanish:
 # court_events_james_l_spanish.yml
 court.0101.t:0 "Escoria en la corte"
 court.0101.desc.opening:1 "Un prisionero llamado [lowborn_criminal.GetName] ha sido llevado ante [executioner.GetName] por"
 court.0101.desc.murderer:0 "¡un asesinato incalificable!\n\n"
 court.0101.desc.deviant:0 "¡actos de bestialidad y vicio impío!\n\n"
 court.0101.desc.witch:0 "¡actos de maldad y crímenes contra [lowborn_criminal.GetFaith.FateGodName]!\n\n"
 court.0101.desc.lazy:0 "desobedecer las órdenes de su maestro. Como aprendiz del albañil de la aldea, se acusa a [lowborn_criminal.GetName] de responderle a su maestro, desobedecer órdenes e incluso cuestionar la pericia de su superior."
 court.0101.desc.thief:0 "numerosos cargos de robo por todo el reino.\n\n Esta escoria ha dejado seco a este gran [ROOT.Char.GetPrimaryTitle.GetName] con su apropiación de propiedades de la corona como pan, verduras ¡e incluso ropa!"
 court.0101.desc.sumptuary:0 "violar la ley suntuaria de [ROOT.Char.GetTitleAsNameNoTooltip].\n\n Ha estado vistiendo todo tipo de telas llamativas y antiestéticas con ropa mal combinada. Esto es más que un simple crimen contra [ROOT.Char.GetTitleAsNameNoTooltip], es un crimen contra la decencia común."
 court.0101.desc.cannibal:0 "[lowborn_criminal.GetName] y su familia han estado viviendo en una cueva cerca de [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip], atrayendo a viajeros con promesas de comida y refugio. Se cree que su familia ha canibalizado a más de mil viajeros de esta manera, y los residentes de [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] exigen justicia."
 court.0101.desc.sadistic:0 "El criminal le rajó la garganta al molinero y saqueó su casa. Además, obligó a la esposa del molinero a cocinarle unos huevos que procedió a comer sobre el cuerpo del difunto, obligando a la viuda a acompañarle en el festín."
 court.0101.desc.priest:0 "Siendo [lowborn_criminal.GetFaith.PriestNeuter], [lowborn_criminal.GetName] asesinó a un miembro de su propio rebaño. Este desgraciado intentó recibir el perdón de las autoridades [lowborn_criminal.GetFaith.GetAdjective|l]s, pero la guardia real lo atrapó volviendo a entrar en [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] y detuvo de inmediato a este impío [lowborn_criminal.GetFaith.PriestNeuter]."
 court.0101.desc.stableboy:1 "¡[lowborn_criminal.GetName] fue atrapado en mitad de actos explícitos con el [lowborn_criminal.Custom('servant_for_romance')] real! ¡Esto no es solo un acto de infidelidad, es un insulto al honor de la Casa [ROOT.Char.GetHouse.GetBaseNameNoTooltip]!"
 court.0101.desc.kinky:0 "[lowborn_criminal.GetName] fue hallado encadenado a un poste, cubierto de pies a cabeza con gachas y con un artilugio antiestético sujeto a sus partes pudendas. Las heridas en su cuerpo indican lesiones por placer, y el prisionero parece carecer totalmente de vergüenza por sus deseos antinaturales."
 court.0101.desc.animals:1 "El prisionero fue atrapado cometiendo actos impíos con un miembro de su ganado, un caballo y un panal de miel. ¡Semejante acto de desviación desafía la voluntad de [lowborn_criminal.GetFaith.FateGodName] y es un crimen no solo contra la naturaleza, sino contra la decencia y el sentido común!"
 court.0101.desc.baby_soup:0 "[lowborn_criminal.GetName] ha sido denunciado por los habitantes de [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] por el acto incalificable de hervir vivos a sus propios hijos recién nacidos con hierbas y verduras. ¡Este acto bestial fue un intento de prolongar su vida de forma antinatural!"
 court.0101.desc.suspicious_healer:1 "Como sanador, [lowborn_criminal.GetName] ha sido acusado de usar magia negra para traer la muerte a los enfermos y ancianos de [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]. Sus fechorías son demasiadas para contarlas, lo que le ha valido el apodo de «el Ángel de [lowborn_criminal.GetFaith.DeathDeityName]»."
 court.0101.desc.devil_worshiper:0 "Aunque se le creía [lowborn_criminal.GetWomanMan] piadoso, [lowborn_criminal.GetName] mantenía un altar privado en su vivienda; tras una inspección, se descubrió que no adoraba a [lowborn_criminal.GetFaith.HighGodName], sino a [lowborn_criminal.GetFaith.WitchGodName], ¡y le ofrecía sacrificios impíos!"
 court.0101.desc.outro:1 "\n\n[executioner.GetName] insiste en que está tan horrorizado con este pecador como cualquiera, y os pregunta qué debería ser de este miserable individuo."
 court.0101.a.cannibal:0 "Trocead a toda la familia para los perros."
 court.0101.a.sadistic:0 "Unas cuantas vueltas en la rueda lo enderezarán."
 court.0101.a.priest.sky:0 "Que los buitres se den un festín con su cuerpo... vivo."
 court.0101.a.priest:0 "Asegúrate de que tenga un entierro adecuado... vivo."
 court.0101.a.stableboy:0 "Que le quiten sus partes y se las den de comer a los caballos."
 court.0101.a.kinky:0 "Que lo azoten públicamente hasta que muera."
 court.0101.a.animals:0 "Quemadlo vivo junto a su ganado."
 court.0101.a.baby_soup:0 "Arrojadlo a un caldero de brea."
 court.0101.a.suspicious_healer:0 "Que pruebe un poco de su propia «medicina»."
 court.0101.a.devil_worshiper:0 "Quizás una llama abierta le ayude a sentirse cerca de su [lowborn_criminal.GetFaith.WitchGodMistressMaster]."
 court.0101.a:0 "La tortura hasta la muerte es la única respuesta."
 court.0101.b:0 "Haced con ellos lo que queráis."
 court.0101.c.deviant:1 "¡Parece que sabe cómo pasárselo bien!"
 court.0101.c.beastiality:1 "... ¿#EMP y#! un caballo? ¡Es un genio creativo!"
 court.0101.c:0 "¡[lowborn_criminal.GetName] sabe cómo divertirse!"
 court.0101.d:0 "Encerradlos, decidiré más tarde..."

 court.0102.t:0 "La mancha social de la ejecución"
 court.0102.desc:0 "Veo a [executioner.Custom2('MyCharacterIntroduction', ROOT.Char)] con una mirada melancólica. Al preguntarle qué inquieta a su mente sombría, suspira.\n\n «Verá, mi [ROOT.Char.GetLadyLord], cada noche tengo que viajar muy lejos de [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] para dormir. A los verdugos no se nos permite estar dentro de los límites de la ciudad. No es que no me guste torturar y eso, es solo que uno se siente solo cuando las únicas voces que oye son los gritos de los condenados»."
 court.0102.a:0 "Duerme en el castillo esta noche, amigo mío."
 court.0102.b:0 "Es una vida dura, pero alguien tiene que vivirla."
 court.0102.c:0 "¡Ja! ¡No mereces más simpatía que las ratas de mi alcantarilla!"

 court.0103.t:0 "Una oportunidad sepulcral"
 court.0103.desc.opening:1 "[executioner.Custom2('MyCharacterIntroduction', ROOT.Char)|U] me ha estado llamando la atención últimamente; parece vestir ropajes cada vez más caros y se pavonea como un pavo real.\n\nAl preguntarle, me muestra una sonrisa amarillenta y me confiesa que se ha estado apropiando de objetos de valor de los condenados."
 court.0103.desc.hair_and_teeth:0 "Su negocio implica vender mechones de pelo de los prisioneros a fabricantes de muñecas, dientes a quienes les faltan, e incluso ojos a quienes practican la brujería."
 court.0103.desc.jewelry:0 "Ha confesado robar prendas y joyas a los condenados para venderlas, obteniendo un buen beneficio de las pocas posesiones que les quedan en las mazmorras. ¡Incluso ha estado robando a los cadáveres de los recién fallecidos!"
 court.0103.desc.meat:0 "¡Ha estado descuartizando a los recién fallecidos y vendiendo sus cortes en el mercado como carne exótica! Afirma que es una alternativa mejor que darles los ritos funerarios, ya que los condenados no merecen tales honores."
 court.0103.desc.saint_bones:0 "¡Ha estado extrayendo vísceras de los huesos de prisioneros plebeyos y vendiéndolos como artefactos falsificados, engañando a visitantes extranjeros y hombres santos para que compren estos huesos como si fueran reliquias de santos!"
 court.0103.desc.outro:0 "\n\nClaramente, ha estado ganando una suma considerable, sin importarle lo que otros piensen de su bestial negocio."
 court.0103.a:0 "¡Dame mi parte y te prometo que tendrás más prisioneros!"
 court.0103.b:0 "¡Este comercio macabro termina ahora mismo!"
 court.0103.c:0 "Fingiré que no he oído nada."

 court.0104.t:0 "Una obsesión malsana"
 court.0104.desc:0 "«¡Oh! ¡Oh! ¿Y luego qué hiciste?». Oigo la voz animada de mi pupilo, [morbid_child.GetName], resonando por los pasillos de [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]. Para mi asombro, veo que mira a [executioner.Custom2('MyCharacterIntroduction', ROOT.Char)] con una adoración fantasiosa que nunca había visto en el [morbid_child.Custom('GirlBoy')]. «¡Encendí la llama y la rata empezó a cavar justo en su pecho para escapar! ¡Un clásico, cantó como un ruiseñor!». El verdugo suelta un chillido burlón para diversión de [morbid_child.GetName]."
 court.0104.a:0 "¡Hilarante! ¿Y qué pasó después?"
 court.0104.b:0 "¡Esta fascinación sombría termina ahora!"
 court.0104.c:0 "Fingiré que no he oído nada."

 court.0106.t:0 "Teatro oscuro para actos oscuros"
 court.0106.desc:0 "Crepúsculo en la corte. El verdugo ha salido de su lúgubre morada y se presenta ante las brasas de la corte, con sangre fresca manchando sus ropajes harapientos y unas tenazas mugrientas goteando en la mano. «Mi [ROOT.Char.GetLadyLord], últimamente he estado pensando... ¿Hasta dónde puedo llegar para hacerlos gritar?»."
 court.0106.a:0 "Lo que sea necesario para extraer una confesión."
 court.0106.b:0 "Sed suave con esas pobres almas miserables."
 court.0106.c:0 "Lo que hagáis en ese lugar espantoso es asunto vuestro."

 court.0107.t:1 "[unruly_child.GetNameNoTooltip] desesperado"
 court.0107.desc:1 "Desde mi trono, oigo los gritos viscerales de [unruly_child.Custom2('MyCharacterIntroduction', ROOT.Char)] y sonidos de forcejeo. Salgo disparado por el pasillo y me detengo en seco al ver a [tutor.Custom2('MyCharacterIntroduction', ROOT.Char)] sujetando al pobre [unruly_child.Custom('GetLassLad')] con un brazo mientras sostiene torpemente un libro con el otro.\n\nApenas tengo tiempo de exigir una explicación cuando ambos empiezan a soltar su versión de los hechos.\n\n«¡[unruly_child.GetTitledFirstNameNoTooltip] se niega a dejar que le lea mi obra maestra sobre el arte de [tutor.Custom('GetTutorEducation')]!», grita el tutor.\n\n«¡He oído este libro aburrido mil veces!», protesta [unruly_child.GetNameNoTooltip]. «¡Es tan #EMP pesado!#!»"
 court.0107.a:1 "[unruly_child.GetNameNoTooltip], confía en que [tutor.GetNameNoTooltip] sabe lo que es mejor."
 court.0107.b:1 "Este libro parece fascinante; ¿quizás podría comprároslo?"
 court.0107.b.tt:0 "Obtienes un artefacto de libro"
 court.0107.c:1 "Quizás el [unruly_child.Custom('GetLassLad')] debería aprender algo más..."
 buy_book_artifact:0 "Obtienes un [court_artifact|E] de libro"

 court.0108.t:0 "Un cortesano espectacular"
 court.0108.desc:1 "Afirmando ser un exiliado de una tierra lejana, [foreign_prince.Custom('GetPrincessPrince')] [foreign_prince.GetName] ha aparecido en la corte acompañado de una gran variedad de animales exóticos y ya ha realizado increíbles obras de caridad en las calles de [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip].\n\n¡El extranjero, de una riqueza magnífica, ha declarado su intención de casarse con [available_child.Custom2('MyCharacterIntroduction', ROOT.Char)]!\n\nAunque la corte bulle de entusiasmo por este exótico [foreign_prince.Custom('GetPrincessPrince')], no todos están convencidos. [sceptical_courtier.Custom2('MyCharacterIntroduction', ROOT.Char)|U] afirma no haber oído hablar nunca de la tierra lejana de la que procede el extranjero y no la encuentra en ningún mapa.\n\n[sceptical_courtier.GetSheHe|U] ha denunciado a [foreign_prince.GetName] como un charlatán e insiste en que lo castiguemos por intentar engañar a [available_child.GetName] para que se case con un #EMP plebeyo#!."
 court.0108.a:1 "No seas aguafiestas, [sceptical_courtier.GetNameNoTooltip]. ¡Se casarán por la mañana!"
 court.0108.b:1 "¡[sceptical_courtier.GetNameNoTooltip] tiene razón! ¡A la mazmorra con él!"
 court.0108.c:1 "Gracias por la visita, [foreign_prince.GetName], pero deberíais marcharos."

 court.0109.t:0 "Un experto anatómico"
 court.0109.desc:1 "Mientras deambulo por la corte, oigo los murmullos familiares de mis cortesanos divirtiéndose y debatiendo su papel en [ROOT.Char.GetPrimaryTitle.GetNameNoTooltip]. Para mi sorpresa, escucho a [executioner.Custom2('MyCharacterIntroduction', ROOT.Char)] conversando con [learned_courtier.Custom2('MyCharacterIntroduction', ROOT.Char)] sobre la naturaleza de la curación y la medicina. Parece notablemente familiarizado con el funcionamiento del cuerpo humano y, al notar mi presencia, me invita a unirme a la charla.\n\n«Uno no se pasa los días abriendo hombres en canal sin aprender una cosa o dos sobre la creación de [executioner.GetFaith.HealthGodNamePossessive]», dice tras describir su método de usar sanguijuelas para purgar la corrupción de una herida infectada.\n\nParece que [executioner.GetNameNoTooltip] ha estado usando su experiencia en anatomía humana para ayudar a los lugareños y se ha convertido en una especie de sanador y partero local. También ha confesado proporcionar atención médica a la escoria de mis mazmorras."
 court.0109.a:0 "¡Estás desperdiciado como verdugo! ¡Sé mi médico de la corte!"
 court.0109.b:0 "¡No pierdas el tiempo curando a esa chusma!"
 court.0109.c:0 "Fascinante, quizás podríais instruirme en vuestros métodos."
 court.0109.d:0 "¡Buen trabajo! Seguid sirviendo a los enfermos y necesitados de [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip]."

 court.0110.t:0 "Un sermón sobre la lujuria"
 court.0110.desc.intro:0 "Me paseo por mi corte, satisfecho tras otra noche llena de lujuria y pasión, ¡cuando me veo acorralado por [parent.Custom2('MyCharacterIntroduction', ROOT.Char)] y [chaplain.Custom2('MyCharacterIntroduction', ROOT.Char)]! Me miran con una mezcla de asco, reproche y preocupación.\n«¿Qué significa esto?», exijo saber.\n\n"
 court.0110.desc.deviant:1 "«Hijo mío, temo mucho por tu alma. Cada noche te entregas a actos de bestialidad que harían que [ROOT.Char.GetFaith.FertilityGodName] se diera la vuelta con repugnancia»."
 court.0110.desc.pox:0 "«Tienes más amantes que pulgas un perro sarnoso. Temo que la sífilis no sea lo único que manche tu cuerpo cuando tu lujuria se sacie»."
 court.0110.desc.notspecial:0 "«¡Tu cuerpo es un templo y lo tratas como un burdel! ¿Habrá amantes suficientes para llenar el vacío donde debería estar tu alma?»."
 court.0110.desc.outro:0 "Mi [parent.GetMotherFather] me castiga con poco remordimiento.\n\n«¡Cada noche que te dedicas a esos deleites terrenales, das un paso más hacia [ROOT.Char.GetFaith.NegativeAfterLife]!», añade [chaplain.GetNameNoTooltip]. «Te confrontamos ahora para salvar tu alma, querido hijo. Se requiere un voto de celibato, nada menos podrá salvarte de una eternidad de tormento»."
 court.0110.a:0 "¡Qué insolencia! ¡A la mazmorra!"
 court.0110.b:0 "Tenéis razón, temo por mi alma inmortal."
 court.0110.c:0 "¡No seré confinado en una prisión sensorial!"

 court.0111.t:0 "Una reliquia de venganza"
 court.0111.desc:1 "Al recorrer la corte, me encuentro con una acalorada discusión entre [executioner.Custom2('MyCharacterIntroduction', ROOT.Char)] y [antiquarian.Custom2('MyCharacterIntroduction', ROOT.Char)] sobre si el cráneo de [rival.Custom2('MyCharacterIntroduction', ROOT.Char)] sería un artefacto adecuado para mi corte.\n\n«Ah, mi [ROOT.Char.GetLadyLord], quería darle el cráneo de [rival.GetTitledFirstNameNoTooltip] como regalo, si llegara a tener un final prematuro». El verdugo se frota las manos manchadas de sangre con alegría infantil. «¡O quizás unir sus dientes para hacer un collar con estilo!».\n\n«¡Mi [ROOT.Char.GetLadyLord], seguro que no pretendéis que intente disfrazar semejante objeto mórbido como una reliquia digna de la corte!», protesta [antiquarian.GetTitledFirstNameNoTooltip]. «Quizás esta criatura debería quedarse en las mazmorras, donde pertenece, y dejar el asunto de las reliquias a los expertos»."
 court.0111.a:0 "¡Su cráneo sería una curiosidad excelente para mostrar en los banquetes!"
 court.0111.b:0 "Una idea absolutamente grotesca."
 get_skull_artifact:0 "Obtienes un [court_artifact|E] de cráneo"

 court.0112.t:0 "Un cadáver en el armario"
 court.0112.desc:1 "Me adentro en mi ilustre armario, buscando qué telas magníficas hay al fondo. Encuentro una bolsa de tartán, mucho más pesada que las demás, y al abrirla, caigo hacia atrás cuando el hedor potente de un cadáver podrido me golpea las fosas nasales.\n\nEl cuerpo de un extraño, parcialmente descompuesto y momificado, sentado en un charco de sus propios fluidos, me mira con la boca abierta.\n\nGrito como un recién nacido y, como si mi llamada lo hubiera invocado, [guilty_courtier.Custom2('MyCharacterIntroduction', ROOT.Char)] aparece en la puerta, con una mirada de culpa y asco en su rostro.\n\n«¡Mi [ROOT.Char.GetLadyLord], debéis creerme cuando digo que me estaba defendiendo! ¡Entró en vuestros aposentos y, si no hubiera actuado, nos habría matado! ¡Solo [guilty_courtier.GetFaith.FateGodName] sabe qué más pretendía!».\n\n[guilty_courtier.GetNameNoTooltip] está tan consumido por la pena que confiesa de inmediato. «¡Os lo ruego, mirad hacia otro lado y os confeccionaré una prenda que hará que hasta el más rico [ROOT.Char.GetTitleAsNameNoTooltip] se ponga verde de envidia!»"
 court.0112.a:0 "¿Verde como este cuerpo? Trato hecho."
 court.0112.a.tt:0 "Obtienes un artefacto de regalía"
 court.0112.b:0 "¡Pronto todo [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTierNoTooltip] sabrá lo que has hecho!"
 court.0112.c:0 "No hablemos nunca más de esto."
 get_regalia_artifact:0 "Obtienes un [artifact|E] de regalía"