# Pisoteado
 court.8001.t:0 "Pisoteado"
 court.8001.desc.intro:0 "¿Cuántas veces te he dicho que te mantengas #EMP ¡lejos!# de las [ROOT.Char.Custom('get_region_flower_type_plural')] #EMP ¡recién plantadas!#?" \n\n¿Es ese mi jardinero, [gardener.GetTitledFirstName], a quien oigo gritar? Me giro para ver cómo trae a [child_1.Custom2('MyCharacterIntroduction', ROOT.Char)] de la nuca por el pasillo hacia mí. \n\n[child_1.GetFirstNameNoTooltip] se agita salvajemente, con el cuerpo cubierto de pétalos y tierra, sin poder alcanzar el brazo de [gardener.GetFirstNamePossessiveNoTooltip]: "¡Suéltame! ¡Se lo diré al [ROOT.Char.GetTitleAsNameNoTooltip]!" \n\nMi jardinero suelta su carga como un fardo a mis pies: "¡[child_1.Custom('GirlBoy')] ha pisoteado todo mi duro trabajo, mi [ROOT.Char.GetLadyLord]! Me tomará #EMP semanas#! deshacer el daño..." \n\n[child_1.GetFirstNameNoTooltip] se limpia las lágrimas de los ojos y solloza con suavidad:"
 court.8001.desc.diplomacy:0 "¡Me estaban persiguiendo! ¡Nunca he perdido un juego de #EMP traes!#!"
 court.8001.desc.martial:0 "Solo me escondía de los soldados... ¡teníamos que emboscarlos para ganar la batalla!"
 court.8001.desc.stewardship:0 "¡No es mi culpa! [gardener.GetSheHe|U] las puso sobre nuestro pequeño castillo."
 court.8001.desc.intrigue:0 "Estábamos jugando al escondite, ¡nadie me habría encontrado si no fuera por #EMP [gardener.GetHerHim]#!"
 court.8001.desc.learning:0 "¡Solo estaba mirando! ¡Esta vez son de un color diferente!"
 court.8001.desc.fallback:0 "¡Yo no hice nada! ¡Solo estaba jugando!"
 court.8001.a.diplomacy:0 "A veces vale la pena que a uno lo atrapen, mi [child_1.Custom('GirlBoy')]."
 court.8001.a.martial:0 "¡Pero también debes elegir el campo de batalla #EMP adecuado#!, mi [child_1.Custom('GirlBoy')]!"
 court.8001.a.stewardship:0 "Conozco un lugar mejor para construir tu poderosa corte, mi [child_1.Custom('GirlBoy')]."
 court.8001.a.intrigue:0 "Oh, te enseñaré algunos lugares mucho mejores, mi [child_1.Custom('GirlBoy')]."
 court.8001.a.learning:0 "También puedes aprender mucho desde la distancia, mi [child_1.Custom('GirlBoy')]."
 court.8001.a.lesson_tt:0 "[child_1.GetFirstNameNoTooltip] entiende tu punto"
 court.8001.b.gardener:0 "¡No! Los parterres #EMP no#..."
 court.8001.b.poet:0 "Belleza delicada, siempre aplastada por necios torpes..."
 court.8001.c:0 "Irás a ayudar a replantarlas."
 court.8001.c.gardener_tt:0 "[child_1.GetFirstNameNoTooltip] tiene buena mano para las plantas"
 court.8001.d:0 "¿Cómo te #EMP atreves#! a tratar a [child_1.GetFirstNameNoTooltip] de esa manera?"
 court.8001.e:0 "Los niños pueden jugar donde quieran, [gardener.GetFirstNameNoTooltip]."
# # Mal equipado
 court.8010.t:0 "Equipo deficiente"
 court.8010.desc.intro:0 "Estoy disfrutando de un raro momento de tranquilidad entre consejos, cuando [underequipped.GetTitledFirstName] me lleva a un lado. \n\n"Mi señor...", comienza [underequipped.GetSheHe] con cautela,"
 court.8010.desc.champion:0 ""Como vuestro campeón, me enorgullece representaros,"
 court.8010.desc.bodyguard:0 ""Como vuestro guardaespaldas, es un honor protegeros,"
 court.8010.desc.bold:0 "¡pero esto es ridículo!" \n\n[underequipped.GetSheHe|U] desenvaina a medias su hoja, señalando sus muchas muescas. "¡No se puede esperar que haga mi trabajo con este trozo de hierro deforme!""
 court.8010.desc.meek:0 "pero..." \n\n[underequipped.GetSheHe|U] duda por un momento, luego hace un gesto de exasperación con su vaina: "¿Cómo se supone que voy a hacer mi trabajo con esta cosa vieja?""
 court.8010.desc.body:0 "\n\n"Sin duda, la calidad lo es todo cuando se trata de"
 court.8010.desc.champion_end:0 "¡actuar en nombre de [ROOT.Char.GetTitleAsNamePossessiveNoTooltip]!""
 court.8010.desc.bodyguard_end:0 "¡proteger la vida de [ROOT.Char.GetTitleAsNamePossessiveNoTooltip]!""
 court.8010.a:0 "¡Mis mejores [underequipped.GetWomenMen] necesitan armas de calidad!"
 court.8010.a.tt:0 "Se forjará una nueva arma de calidad a elección de [underequipped.GetTitledFirstNameNoTooltip]"
 court.8010.a.equipped_tt:0 "Se forja un arma excelente para [underequipped.GetTitledFirstName]"
 court.8010.c:0 "Supongo que podría prescindir de una de mis propias armas..."
 court.8010.c.equipped_tt:0 "[underequipped.GetTitledFirstNameNoTooltip] recibe un arma de regalo"
 court.8010.d:0 "Ve a la armería, como todo el mundo."
 court.8010.d.tt:0 "[underequipped.GetTitledFirstNameNoTooltip] recogerá una espada de mala calidad de la armería"
 court.8010.d.equipped_tt:0 "[underequipped.GetTitledFirstName] recibe una espada de la armería"
 court.8010.e:0 "¡Fuera de mi vista, [underequipped.Custom('InsultNoun')] insolente!"
 # # El peak del outfit
 court.8020.t:0 "Crítica de vestuario"
 court.8020.desc:0 "En un día cualquiera en la corte, escucho el tono irritado de mi [couture_spouse.GetWifeHusband], [couture_spouse.GetTitledFirstName]; parece que [couture_guest.GetTitledFirstName] le ha provocado. \n\nAl acercarme, veo a mi invitado burlándose: "Estas supuestas #EMP modas#! son una vergüenza; solo serían aptas para sirvientes y niños en cualquier corte #EMP [couture_guest.GetCulture.GetNameNoTooltip]#! respetable".\n\nMi [couture_spouse.GetWifeHusband] se enciende y grita: "¡Ya he tenido #EMP suficiente#! de ti! ¡No me importa si eres el invitado de [ROOT.Char.GetTitleAsNamePossessiveNoTooltip]!", para sorpresa de [couture_guest.GetFirstNamePossessiveNoTooltip]. \n\nLlevándome a un lado, [couture_spouse.GetFirstNameNoTooltip] se queja: "Ese [couture_guest.Custom('InsultNoun')] desagradecido no deja de burlarse; ayer mis sirvientes le oyeron decir que nuestras tendencias son #EMP passé!#!""
 court.8020.a:0 "Vamos, solo nos está tomando el pelo."
 court.8020.b:0 "Supongo que podríamos esforzarnos un poco más..."
 court.8020.d:0 "¿Passé? #EMP ¡¿PASSÉ?!#!"

 poor_host_modifier:0 "Anfitrión inadecuado"
 poor_host_modifier_desc:0 "Este personaje ha roto las reglas no escritas de la hospitalidad."
 hunting_pooches_modifier:0 "Sabuesos excelentes"
 hunting_pooches_modifier_desc:0 "La corte de este personaje cuenta con perros de caza particularmente impresionantes."
 # # Pawful of Pooches
 court.8030.t:0 "Puñado de cachorros"
 court.8030.desc.intro:0 "Mientras [huntmaster.GetTitledFirstName], mi $master_of_hunt_court_position$, entra en la sala, un grupo de cortesanos se abalanza sobre [huntmaster.GetHerHim] entre arrumacos. \n\nCuando finalmente logra pasar, la causa del revuelo queda clara: en sus brazos acuna una manta llena de cachorros que no dejan de moverse, una especie de [ROOT.Char.Custom('get_region_dog_type')] por su aspecto... ¡y muy impresionantes, por cierto! \n\nMi $master_of_hunt_court_position$ sonríe de oreja a oreja: "Mi señor, simplemente tenía que mostraros esta camada; una vez que estos cachorros crezcan y sean entrenados, ¡me atrevo a decir que serán la envidia de cada partida de caza de [ROOT.Char.GetPrimaryTitle.GetAdjectiveNoTooltip]!" \n\n"
 court.8030.desc.one:0 "No puedo evitar notar a mi [child_1.Custom('ComplimentAdjective')] [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('child_1'))], [child_1.GetFirstNameNoTooltip], esforzándose por ver de cerca a los pequeños canes."
 court.8030.desc.two:0 "Por el rabillo del ojo veo a dos de mis vástagos, [child_1.GetFirstName] y [child_2.GetFirstName], claramente embelesados con los perritos, y en particular con el más grande de la camada."
 court.8030.desc.body:0 "\n\nAl levantar al más grande, [huntmaster.GetTitledFirstNameNoTooltip] reflexiona: "¡Este podría ser el mejor perro de su generación!" "
 court.8030.a:0 "¡No puedo esperar a su debut!"
 court.8030.b:0 "¡El más grande será para mi [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('child_1'))], [child_1.GetFirstNameNoTooltip]!"
 court.8030.c:0 "Solo [child_2.GetFirstNameNoTooltip] merece un ejemplar tan bueno."
 court.8030.d:0 "¡Ah, he estado esperando un cachorro tan magnífico!"
# # Aristocratic Pretensions
 court.8040.t:0 "Pretensiones aristocráticas"
 court.8040.desc.intro:0 "Tres de mis cortesanos discuten abiertamente sobre mi "gran número" de títulos, asegurándose de que los oiga y lamentando en voz alta lo agotador que debe ser para [ROOT.Char.GetTitleAsNameNoTooltip] gestionar tantas tierras [ROOT.Char.GetHerselfHimself]... \n\nSon uña y carne:"
 court.8040.desc.position_holder:1 "el fiel [position_holder.GetName], sirviente de la corte;"
 court.8040.desc.knight:1 "el galante [knight.GetName], mi distinguido [ROOT.Char.Custom('MountedWarriorTerm')|U];"
 court.8040.desc.relative:1 "[relative.GetName], mi pariente con aires de grandeza;"
 court.8040.desc.ambitious:1 "[ambitious.GetName], con sed de poder y siempre al acecho;"
 court.8040.desc.arrogant:1 "[arrogant.GetName], con altivez y la cabeza siempre alta;"
 court.8040.desc.lowborn:1 "[lowborn.GetName], alguien que se ha hecho a sí mismo y aprovecha cualquier oportunidad;"
 court.8040.desc.gentry:1 "[gentry.GetName], de la altiva casa [gentry.GetHouse.GetName];"
 court.8040.desc.generic_1:1 "[ROOT.Char.Custom2('DescriptorNegative', SCOPE.sC('generic_1'))] [generic_1.GetName], feliz de estar allí;"
 court.8040.desc.generic_2:1 "[ROOT.Char.Custom2('DescriptorNegative', SCOPE.sC('generic_2'))] [generic_2.GetName], como le llaman los guardias;"
 court.8040.desc.generic_3:1 "[ROOT.Char.Custom2('DescriptorNegative', SCOPE.sC('generic_3'))] [generic_3.GetName], un cómplice eminentemente olvidable;"
 court.8040.desc.body:0 "y con una ausencia cegadora: una pizca de humildad. \n\nSobre el bullicio de los cotilleos, distingo claramente las palabras: "[worst_title.GetTierAsNameNoTooltip]" y "[worst_title.GetNameNoTier]", en lo que estoy seguro era el tono quejumbroso de [button.GetFirstNameNoTooltip]. \n\nEl trío de desvergonzados se gira hacia mí y les atrapo con la mirada."
 court.8040.a:0 "Sí, sí, [courtier_1.GetTitledFirstNameNoTooltip]... [worst_title.GetNameNoTierNoTooltip] es vuestro."
 court.8040.b:0 "Este jueguecito se acaba: ¡el [worst_title.GetTierAsNameNoTooltip] es para [courtier_2.GetFirstNameNoTooltip]!"
 court.8040.c:0 "¡Vos! ¿[courtier_3.GetTitledFirstNameNoTooltip]? ¡El título os pertenece!"
 court.8040.d:0 "¡Sé lo que tramáis! ¡Es hora de demostrar vuestra valía!"
 court.8040.d.flavor_tt:0 ""Para el más fuerte""
 court.8040.d.courtier_1_tt:0 "[courtier_1.GetFirstNameNoTooltip] lo desea más"
 court.8040.d.courtier_2_tt:0 "[courtier_2.GetFirstNameNoTooltip] es quien queda en pie"
 court.8040.d.courtier_3_tt:0 "[courtier_3.GetFirstNameNoTooltip] sale victorioso"
 court.8040.grant_tt:0 "[new_noble.GetTitledFirstNameNoTooltip] recibe [worst_title.GetNameNoTierNoTooltip]"
 court.8040.e:0 "Que cada uno me diga por qué merece un título."
 court.8040.e.courtier_1_tt:0 "[courtier_1.GetFirstNameNoTooltip] resulta más convincente"
 court.8040.e.courtier_2_tt:0 "[courtier_2.GetFirstNameNoTooltip] impresiona con su elocuencia"
 court.8040.e.courtier_3_tt:0 "[courtier_3.GetFirstNameNoTooltip] habla bien"
 court.8040.f:0 "¿Qué estáis mirando?"
 # Un pajarito me contó un secreto
 court.8050.t:0 "Un pajarito"
 court.8050.desc:0 "Al principio pensé que eran simples manías, pero está claro que alguien del servicio me ha estado haciendo señales de forma furtiva.\n\nMe acerco a [servant.GetHerHim] con mis guardias en un momento de calma, y [servant.GetSheHe] susurra de forma conspiradora: "Gran [ROOT.Char.GetTitleAsNameNoTooltip], mi nombre es [servant.GetFirstName]. Oímos mucho mientras atendemos a vuestros invitados; apenas notan nuestra presencia..." \n\nExamino a [servant.GetHerHim] con duda, preguntándome si realmente quiero escuchar lo que dirá a continuación. [servant.GetSheHe|U] me devuelve la mirada, claramente sin saber si está cometiendo un error. \n\nAl fin, [servant.GetSheHe] traga saliva: "Mi [ROOT.Char.GetLadyLord], [vassal.GetTitledFirstName], vuestro [servant.Custom2('DescriptorNegative', SCOPE.sC('vassal'))] [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('vassal'))], [vassal_secret.Custom('SecretDescriptionThirdPerson')] tras las puertas cerradas de vuestro [ROOT.Char.Custom('FortifiedBuilding')]; ¡lo juro con [servant.GetFaith.HighGodName] como testigo!""
 court.8050.a:0 "Necesito más gente de confianza como vos, [servant.GetFirstNameNoTooltip]."
 court.8050.a.tt:0 "[servant.GetFirstNameNoTooltip] se unirá a vuestra [court|E]"
 court.8050.b:0 "¿Qué más habéis oído?"
 court.8050.b.tt:0 "Descubriréis un secreto de otra persona en la corte"
 court.8050.b.tt_secret:1 "Secreto de [vassal_2.GetTitledFirstName]"
 court.8050.c:0 "Tomad esto; me informaréis solo a mí."
 court.8050.c.tt:0 "Vuestro [spymaster|E] tendrá más probabilidades de desbaratar intrigas mientras este modificador esté presente"
 court.8050.d:0 "¡Arrestad a esta rata rastrera!"
 court.8050.d.tt_imprison:0 "[servant.GetFirstNameNoTooltip] es enviado a las mazmorras"
 # Modifiers
 servant_informants_modifier:0 "Informantes en el servicio"
 servant_informants_modifier_desc:0 "Los cotilleos en la corte de este personaje son reportados por una red de sirvientes espías."
 # # Scornful Sycophants
 court.8060.t:0 "Aduladores despreciativos"
 court.8060.desc.intro:0 "Me detengo un momento en el umbral del pasillo para admirar la luz del sol cuando oigo risas burlonas a la vuelta de la esquina. \n\n"¡Lo #EMP sé!#", oigo reír a mi [ROOT.Char.Custom2('DescriptorNegative', SCOPE.sC('snooty_1'))] [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('snooty_1'))], [snooty_1.GetFirstName],"
 court.8060.desc.fashion:0 ""A veces, caminar por aquí es como estar en la corte de [ROOT.Char.GetTitleAsNamePossessiveNoTooltip] abuelo; ¡las modas son tan aburridas y anticuadas!" \n\n"
 court.8060.desc.servants_1:0 ""Esperas #EMP todo el día#! a alguien del servicio y luego aparecen dos a la vez... ¡y sin lo que pediste!" \n\n"
 court.8060.desc.food_1:0 ""¿Habéis #EMP visto#! el estado del banquete de anoche? ¡Preferiría masticar el plato antes que comer esa bazofia!" \n\n"
 court.8060.desc.body:0 "Otra voz entre risitas interviene: "¡Cielos, pensé que era la única persona que lo había notado! Sin mencionar...""
 court.8060.desc.lodgings:1 "...¡el #EMP tamaño#! de nuestros aposentos! ¡Apenas hay espacio para el jergón de un criado!""
 court.8060.desc.food_2:0 "...la comida en este lugar es realmente terrible, ¡y con porciones tan #EMP pequeñas!#""
 court.8060.desc.servants_2:0 "...el personal; he dejado de pedirles nada: ¡o no saben qué es o nunca regresan!""
 court.8060.desc.outro:0 "\n\n¿Es ese mi [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('snooty_2'))] [snooty_2.GetTitledFirstName], intentando ahora contener una carcajada? Qué desfachatez..."
 court.8060.a.fashion:0 "Estableceré un nuevo estándar de vestimenta solo para vos, [snooty_1.GetFirstNameNoTooltip]."
 court.8060.a.servants:0 "¿Quizás podríais sugerir personal más capacitado, [snooty_1.GetFirstNameNoTooltip]?"
 court.8060.a.food:0 "[snooty_1.GetFirstNameNoTooltip], tengo planeada una comida especial para mañana."
 court.8060.b.food:0 "Pronto empezará un nuevo cocinero, [snooty_2.GetFirstNameNoTooltip]."
 court.8060.b.lodgings:0 "Me mudaré a habitaciones más grandes esta noche, [snooty_2.GetFirstNameNoTooltip]."
 court.8060.b.servants:0 "Supongo que nos vendrían bien unas cuantas manos más."
 court.8060.c:1 "Apartaos de mi camino, sabandijas desagradecidas..."
 court.8060.d:0 "¡Si no os gusta, buscad a alguien más a quien parasitar!"
 court.8060.e:0 "Las distracciones mundanas solo nos separan de [ROOT.Char.GetFaith.PositiveAfterLife]."
 court.8060.e.pious_tt:0 "Cualquier vasallo o cortesano no Cínico de una fe Ascética"
 court.8060.f:0 "Hace un día encantador, ¿verdad?"
 court.8060.f.flavor:0 "Las apariencias deben mantenerse"
 # # Feeling Useful
 court.8070.t:0 "Sentirse útil"
 court.8070.desc:0 "Mi [parent.GetMotherFather] de carácter [ROOT.Char.Custom2('DescriptorPositive', SCOPE.sC('parent'))] deambula por la corte sin rumbo cada día, dejando claro su anhelo de tener un propósito que estoy demasiado ocupado para darle. \n\nHoy finalmente me acorrala: "¡Oh, aquí estás, [ROOT.Char.GetFirstNameNoTooltip]! ¡Para mí sigues siendo mi pequeño [ROOT.Char.Custom('GirlBoy')], lo sabes! Déjame quitarte algo de peso de encima; todavía hay mucho que puedo enseñarte". \n\nMi séquito hace lo posible por mirar hacia otro lado, pero eso solo empeora mi vergüenza. \n\n"[ROOT.Char.Custom('GetDaughterSon')|U], ¿qué ocurre? ¿Acaso no te importa tu pobre [parent.Custom('GetMaPa')]? ¿Después de todo lo que he hecho por ti?""
 court.8070.a:0 "Encontraré algo que podáis hacer, [parent.Custom('GetMamaPapa')]."
 court.8070.a.tt:0 "[parent.GetFirstNameNoTooltip] esperará un [court_position|E] en los próximos meses"
 court.8070.b:0 "¿Habéis pensado en entregar vuestra vida a [ROOT.Char.GetFaith.HighGodName]?"
 court.8070.c:0 "Aceptad cualquier tarea..."
 court.8070.d:0 "Estoy #EMP muy#! ocupado, [parent.GetMotherFather]."
 court.8071.satisfied:0 "[parent.GetMotherFather|U] se entusiasma con su papel"
 court.8071.disappoint:0 "[parent.GetMotherFather|U] se cansa de esperar"
 # Modifiers
 promised_court_position_modifier:0 "Puesto prometido"
 promised_court_position_modifier_desc:0 "A este personaje se le ha asegurado un cargo en la corte próximamente, y se lo cuenta a todo el que quiera escucharle."
  # # Maternal Reproach
 court.8080.t:0 "Reproche [parent.Custom('GetMaternalPaternal')]"
 court.8080.desc.intro:0 "Mi [parent.GetMotherFather], [parent.GetTitledFirstName], se ha vuelto cada día más irritable. \n\nMientras descanso en mi trono, contemplando las posibles causas, [parent.GetSheHe] se dirige hacia mí con paso firme, tal como solía hacerlo cuando me portaba mal de [child_1.Custom('GetInfante')].\n\n"¡[ROOT.Char.GetFirstNameNoTooltip], mi [ROOT.Char.Custom('GetDaughterSon')]! Tienes que hacer algo con..."
 court.8080.desc.fashion:0 "...estos harapos lúgubres que llamas ropa!""
 court.8080.desc.servants:0 "...tus sirvientes, ¡que son incompetentes y están desbordados!""
 court.8080.desc.lodgings:0 "...los escasos alojamientos que ofreces a tus invitados!""
 court.8080.desc.food:0 "...las terribles ofrendas de tu mesa de banquete!""
 court.8080.desc.outro:0 "¿Acaso no te importa lo que la gente piense de ti?!"\n\n"No es forma de que [ROOT.Char.GetTitleAsNameNoTooltip] se presente [ROOT.Char.GetHerselfHimself]; a este paso serás el hazmerreír de [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip] — no — ¡de todos los [ROOT.Char.GetCulture.GetCollectiveNounNoTooltip]!""
 court.8080.a:0 "Sí, [parent.Custom('GetMamaPapa')], lo arreglaré..."
 court.8080.b:0 "Ah, ¿así que os creéis mejor que mis cortesanos?"
 court.8080.b.tt:0 "Cada [courtier|E]"
 court.8080.c.nun:0 "¿Quizás preferiríais el hábito de una [ROOT.Char.GetFaith.DevoteeFemale]?"
 court.8080.c.monk:0 "¿Quizás preferiríais los ropajes de un [ROOT.Char.GetFaith.DevoteeMale]?"
 court.8080.c.fallback:0 "¿Habéis considerado dedicaros a [ROOT.Char.GetFaith.HighGodName]?"
 court.8080.d.fashion:0 "Creo que #EMP vos#! deberíais cosernos algunos reemplazos."
 court.8080.d.servants:0 "Bueno, ¿por qué no echáis una mano a los sirvientes?"
 court.8080.d.lodgings:0 "¿Quizás podríais ceder vuestra habitación a otra persona?"
 court.8080.d.food:0 "Muy bien, buscad otro lugar donde comer..."
 court.8080.e:0 "¡Ya no podéis hablarme de esta manera!"
 # Modifiers
 court_8080_degraded_modifier:0 "Degradado"
 court_8080_degraded_modifier_desc:0 "Este personaje ha sido humillado públicamente por su descendiente y señor tras haberse quejado."
 # # Building Blocks
 court.8090.t:0 "Bloques de construcción"
 court.8090.desc.intro:0 "Mi [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('architect'))], [architect.GetTitledFirstName], se toma muy en serio sus deberes como $royal_architect_court_position$; su apasionado debate con mi [steward.GetHeldCourtAndCouncilPositionsString], [steward.GetTitledFirstName], domina la sala. \n\n"¡Sí, precisamente!", exclama [architect.GetFirstNameNoTooltip], "las ruinas de allí están llenas de piedra tallada que podría trasladarse fácilmente a..."
 court.8090.desc.religious:0 "...el [ROOT.Char.GetFaith.HouseOfWorship] de [temple_barony.GetNameNoTier]!""
 court.8090.desc.castle:0 "...el [ROOT.Char.Custom('FortifiedBuilding')] de [ROOT.Char.GetTitleAsNamePossessiveNoTooltip] en [my_barony.GetNameNoTier]!""
 court.8090.desc.outro:0 "\n\n[steward.GetFirstNameNoTooltip] se frota la barbilla con duda: "Aun así, parece mucho trabajo, y a los lugareños que usan esos materiales no les gustará". \n\n[architect.GetFirstNameNoTooltip] pone los ojos en blanco ante esta réplica razonable,"
 court.8090.desc.chaplain:0 "pero le interrumpe mi [chaplain.GetHeldCourtAndCouncilPositionsString]: "El cercano [ROOT.Char.GetFaith.HouseOfWorship] de [temple_barony.GetNameNoTier] necesita urgentemente una ampliación", chilla [chaplain.GetTitledFirstName]. "¡Ahí es donde deberían ir los escombros!""
 court.8090.desc.fallback:0 "con desprecio: "¡Podemos darles un uso mucho mejor del que los plebeyos podrían jamás, ya lo sabéis!""
 court.8090.a:0 "[my_barony.GetNameNoTierNoTooltip] #EMP podría#! recibir algunas mejoras..."
 court.8090.b:0 "Irán a la casa de [ROOT.Char.GetFaith.HighGodName] en [temple_barony.GetNameNoTierNoTooltip]."
 court.8090.c:0 "En su lugar, quiero expandir [backup_barony.GetNameNoTooltip]."
 court.8090.d:0 "Dejad esos viejos sillares para los plebeyos."
 # Modifiers
 court_8090_commoners_modifier:0 "Ruinas comunes"
 court_8090_commoners_modifier_desc:0 "La gente común de este condado se beneficia de desmantelar viejas ruinas para obtener materiales de construcción."
 # # Questionable Concoction
 court.8100.t:0 "Brebaje cuestionable"
 court.8100.desc:0 "Caminando entre audiencias, oigo a mi [ROOT.Char.Custom2('DescriptorPositive', SCOPE.sC('physician'))] $court_physician_court_position$, [physician.GetTitledFirstName], discutiendo su última fantasía. \n\n"...se supone que es la poción más fuerte que existe, y que solo proviene de los confines más lejanos del mundo, o eso dicen los mercaderes y alquimistas con los que he hablado". \n\n[physician.GetSheHe|U] saca un vial con un líquido amarillo pálido, agitándolo bajo las narices de mis cortesanos. \n\n"Dicen que otorga vigor y larga vida, y que es la favorita de quienes van a la batalla, pero solo los más fuertes pueden soportar su poder"."
 court.8100.a:0 "¿La poción más fuerte, decís? Dádmela."
 court.8100.b:0 "¿De veras? Que mi $food_taster_court_position$ la pruebe primero."
 court.8100.b.tt_forgiving:1 "[food_taster.GetTitledFirstName] no es $trait_forgiving$:"
 court.8100.c:0 "Solo [ROOT.Char.GetFaith.WarGodName] puede darnos fuerza."
 court.8100.d:0 "¡Esa bazofia no es apta para una bestia, mucho menos para un hombre!"
 court.8100.tt.handle_potion:0 "Bebes la poción más fuerte"
 court.8100.tt.need_weaker:0 "Deberías haber buscado una poción más débil"
 court.8100.tt.too_strong:0 "La poción es demasiado fuerte para ti"
 # Modifiers
 strong_potion_modifier:0 "Poción fuerte"
 strong_potion_modifier_desc:0 "Este personaje ha logrado soportar las pociones más fuertes."
 feeling_unwell_modifier:0 "Malestar"
 feeling_unwell_modifier_desc:0 "Este personaje debería haber buscado pociones algo más débiles."
 # # Upon the Block
 court.8110.t:0 "Sobre el tajo"
 court.8110.desc.intro:0 "Mi $executioner_court_position$ [my_executioner.GetTitledFirstName], de carácter [my_executioner.Custom('quirk_neg_adjective')], deambula por el palacio [my_executioner.Custom('quirk_neg_pp')], con toda la sutileza de un infante caprichoso.\n\nAl fin, incapaz de tolerar más este espectáculo en mi corte, exijo: "¡¿Pero qué #EMP ocurre#!?!"\n\n[my_executioner.GetSheHe|U] se sorprende, pero responde con rapidez: "Mi [ROOT.Char.GetLadyLord], perdonaos, es solo que no he tenido una buena ejecución en semanas..." \n\n"Vamos, ese..."
 court.8110.desc.leader_1:0 "...detestable agitador, [prisoner_1.GetTitledFirstName],"
 court.8110.desc.heretic:0 "...descarado hereje, [prisoner_1.GetTitledFirstName],"
 court.8110.desc.heathen:0 "...vil pagano, [prisoner_1.GetTitledFirstName],"
 court.8110.desc.infidel:0 "...infiel impío, [prisoner_1.GetTitledFirstName],"
 court.8110.desc.noble:0 "...frenético deplorable, [prisoner_1.GetTitledFirstName],"
 court.8110.desc.fallback:0 "...odioso [prisoner_1.Custom('GetCrime')], [prisoner_1.GetTitledFirstName],"
 court.8110.desc.body:0 "...solo está #EMP languideciendo#!, esperando a que anunciéis su fecha de ejecución."
 court.8110.desc.religious:0 "A [ROOT.Char.GetFaith.DeathDeityName] no le importa cuándo llegue el alma impía a [ROOT.Char.GetFaith.NegativeAfterLife]...""
 court.8110.desc.leader_2:0 "Mientras [prisoner_1.GetSheHe] viva, puede ser un símbolo para otros renegados...""
 court.8110.desc.criminal:0 "Permitidme sacar a ese [prisoner_1.Custom('GetCrimeDesc')] de su miseria...""
 court.8110.a:0 "Muy bien, es la hora de [prisoner_1.GetTitledFirstNameNoTooltip]."
 court.8110.b:0 "No, el siguiente turno es para [prisoner_2.GetTitledFirstNameNoTooltip]."
 court.8110.c:0 "¡Sí, y #EMP vos#! sois un [my_executioner.Custom('GetCrime')]!"
 court.8110.c.flavor:0 "Mi $executioner_court_position$ debe conocer su lugar"
 court.8110.d:0 "Disfrutáis esto demasiado, [my_executioner.GetFirstNameNoTooltip]."
 court.8110.e:0 "No hay prisa."
 # # Novel Perspectives
 court.8120.t:0 "Nuevas perspectivas"
 court.8120.desc.intro:0 "Me siento en silencio, escuchando a mi [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('accuser'))] de carácter [ROOT.Char.Custom2('DescriptorNegative', SCOPE.sC('accuser'))], [accuser.GetTitledFirstName], enfrascado en un agudo debate teológico con mi [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('refuter'))], [refuter.GetTitledFirstName]. \n\nEste último suplica [refuter.Custom('quirk_pos_adverb')],"
 court.8120.desc.same_religion:0 ""...pero la fe [refuter.GetFaith.GetNameNoTooltip] #EMP está#! más cerca de la verdadera palabra de [refuter.GetFaith.HighGodName]; es la destilación más pura de las revelaciones de la religión [refuter.GetFaith.GetReligion.GetAdjectiveNoTooltip]."\n\n[accuser.GetTitledFirstNameNoTooltip] se mofa, [accuser.Custom('quirk_neg_pp')]. "Leed el [accuser.GetFaith.ReligiousText] y veréis que..."
 court.8120.desc.other_religion:1 ""...pero las atrasadas enseñanzas de la religión [accuser.GetFaith.GetReligion.GetAdjectiveNoTooltip] no pueden compararse seriamente con las de nuestra fe [refuter.GetFaith.GetReligion.GetNameNoTooltip]; la verdad de [accuser.GetFaith.HighGodName] no es más que una distorsión de [refuter.GetFaith.HighGodName]."\n\n[accuser.GetTitledFirstNameNoTooltip] se mofa, [accuser.Custom('quirk_neg_pp')]. "Pensadlo profundamente y veréis que..."
 court.8120.desc.marriage:0 "...los sagrados vínculos del matrimonio solo deben compartirse con una persona; así es como nos acercamos a [accuser.GetFaith.PositiveAfterLife].""
 court.8120.desc.divorce:0 "...el divorcio es para quienes no están dispuestos a dedicarse a otro incondicionalmente, buscando la pureza y [accuser.GetFaith.PositiveAfterLife]. \n\n"
 court.8120.desc.adultery:0 "¡[accuser.GetFaith.CreatorName] no pretendía que fornicáramos fuera del matrimonio y persiguiéramos nuestras pasiones; #EMP por eso#! tenemos estos vínculos!"
 court.8120.desc.witchcraft:1 "...los rituales impíos de las brujas están en contradicción con la búsqueda de [accuser.GetFaith.PositiveAfterLife].""
 court.8120.desc.equality:0 "[accuser.GetFaith.CreatorName] creó a hombres y mujeres juntos, ninguno subordinado al otro, al principio de los tiempos.""
 court.8120.desc.cosanguity:0 "¡[accuser.GetFaith.CreatorName] no pretendía que los miembros de la misma familia se casaran o procrearan; esta es una tentación que desafía a la naturaleza!""
 court.8120.desc.outro:1 "\n\n"Por eso no hablo con los perdidos..." [refuter.GetTitledFirstNameNoTooltip] suspira con frustración. "Si no escucháis la verdad, solo espero que de algún modo os libréis del infernal [accuser.GetFaith.NegativeAfterLife].""
 court.8120.a.accuser:0 "[accuser.GetSheHe|U] tiene un punto a su favor, [refuter.GetFirstNameNoTooltip]."
 court.8120.a.refuter:0 "[refuter.GetSheHe|U] tiene un punto a su favor, [accuser.GetFirstNameNoTooltip].""
 court.8120.c:0 "Venid, amigos, hay muchas formas de honrar al Creador."
 court.8120.d:0 "¡Mirad aquí, estas son las verdades de la fe [ROOT.Char.GetFaith.GetAdjectiveNoTooltip]!"
 court.8120.d.tt:0 "Cada vasallo, cortesano y huésped celoso de la fe [THIS.Char.GetFaith.GetAdjectiveNoTooltip]"
 court.8120.e:0 "No quiero volver a oír este tipo de charla, [accuser.GetFirstNameNoTooltip]."
 court.8120.f:0 "No nos corresponde debatir lo divino."
 my_holy_book:0 "[ROOT.Char.GetFaith.ReligiousText|U] de [ROOT.Char.GetTitledFirstNameNoTooltip]"
 my_holy_book_description:0 "La colección personal encuadernada de enseñanzas [ROOT.Char.GetFaith.GetAdjectiveNoTooltip] de [ROOT.Char.GetTitledFirstNameNoTooltip] de [ROOT.Char.GetPrimaryTitle.GetBaseNameNoTier], con un [ROOT.Char.GetFaith.ReligiousSymbol] dorado en la portada."
 # # Contrived Conflict
 court.8130.t:0 "Conflicto artificial"
 court.8130.desc.intro:0 "Mientras estoy en mi trono, dando vueltas a esto y aquello, estalla un furor. \n\nMi $champion_court_position$ [champion.GetFirstName] ruge: "¡Sé exactamente lo que queríais decir, [vassal.Custom('InsultNoun')]! ¡¿Cómo os #EMP atrevéis#! a faltar al respeto a [ROOT.Char.GetTitleAsNameNoTooltip]?!", justo en la cara de [vassal.GetTitledFirstName], que está perplejo. [mediator.GetFirstNameNoTooltip] interviene rápidamente para separarlos, pero el ambiente ya se ha empañado de forma irreparable. \n\n"
 court.8130.desc.bold:0 ""Tal agitación es indigna de esta corte, no me dejaré intimidar por vuestros juegos", replica [vassal.GetTitledFirstNameNoTooltip] [vassal.Custom('quirk_pos_adverb')]. $court.8130.desc.body$ [vassal.GetTitleAsNameNoTooltip] [vassal.Custom('quirk_pos_present')] y responde: "Muy bien, con gusto pondré a este bruto [champion.Custom('InsultAdjective')] en su lugar"."
 court.8130.desc.craven:0 ""¡P-p-pero si yo no he dicho n-nada de eso!", suelta [vassal.GetTitledFirstNameNoTooltip] con incredulidad. $court.8130.desc.body$ [vassal.GetTitleAsNameNoTooltip] [vassal.Custom('quirk_pos_present')] y tartamudea: "¡¿Q-qué?! ¡Vamos, seguro que eso n-no será necesario!""
 court.8130.desc.body:0 ""¡Os oí con mis propios oídos!", brama [champion.GetFirstNameNoTooltip], "¡Exijo satisfacción por este desaire contra mi [ROOT.Char.GetLadyLord]!""
 court.8130.desc.outro:0 "\n\nTodos me miran esperando mi veredicto, mientras [mediator.GetFirstNameNoTooltip] mantiene a los dos separados."
 court.8130.a:0 "[champion.GetFirstNameNoTooltip] defenderá mi honor."
 court.8130.a.tt_champion:0 "[champion.GetTitledFirstNameNoTooltip] gana el duelo"
 court.8130.a.tt_vassal:0 "[vassal.GetTitledFirstNameNoTooltip] gana el duelo"
 court.8130.a.tt:0 "[champion.GetTitledFirstName] y [vassal.GetTitledFirstName] se enfrentan en un [single_combat_duel|E]"
 court.8130.b:0 "Es un malentendido; [vassal.GetFirstNameNoTooltip] es un vasallo leal."
 court.8130.b.tt_me:0 "Gano el duelo"
 court.8130.c:0 "Necesito agentes más sensatos."
 court.8130.d:0 "¡¿Ha dicho #EMP qué?! ¡Traedme mi [ROOT.Char.Custom('signature_weapon')]!"
 court.8130.d.tt:0 "[vassal.GetTitledFirstName] y yo nos enfrentamos en un [single_combat_duel|E]"
 court.8130.e:0 "Calmaos, no habrá duelo."
  # # Royal Lapse
 court.8140.t:0 "Lapsus real"
 court.8140.desc:0 "La pompa de la corte continúa, día tras día, del amanecer al ocaso. [courtier.GetTitledFirstName] improvisa sobre mi grandeza, soltando tópicos y alabanzas. Cerca, [vassal.GetTitledFirstName] se une, buscando el aplauso del público, sonriendo estúpidamente y esperando una señal de mi favor por sus payasadas... \n\nUn deseo profundo e insistente de [ROOT.Char.Custom('GetStressDesire')] surge lentamente, carcomiendo mi mente y distrayendo mi atención. Una sola gota de sudor se desliza interminablemente por mi frente... \n\n[courtier.GetFirstNameNoTooltip] nota mi distancia y pregunta: "¿Os encontráis bien, mi [ROOT.Char.GetLadyLord]?", con una preocupación casi genuina."
 court.8140.a:0 "Mis disculpas, ¿qué decíais?"
 court.8140.a.flavor_tt:0 "¡Conteneos, sois [ROOT.Char.GetTitleAsNameNoTooltip]!"
 court.8140.b:0 "Perdonadme, tengo otros asuntos que atender."
 court.8140.b.flavor_tt:0 "Simplemente levantaos, pasad de largo y salid de la sala"
 court.8140.c:0 "Muy bien..."
 court.8140.c.flavor_tt:0 "Les toleraré, pero solo mientras la etiqueta lo exija"
# # Prandial Excess
 court.8150.t:0 "Exceso prandial"
 court.8150.desc.intro:0 "Cada día parece que mi corte bulle con charlas sobre el próximo banquete, y muchos han ganado bastante peso últimamente..."
 court.8150.desc.taster:0 "\n\n[food_taster.GetTitledFirstName], mi $food_taster_court_position$, parece más letárgico en cada sesión, sudando profusamente mientras cada manjar extranjero se acerca a su boca. \n\n"
 court.8150.desc.body:0 "La actividad culinaria es alimentada por la constante rivalidad entre [vassal_1.GetTitledFirstName], [vassal_2.GetTitledFirstName] y [vassal_3.GetTitledFirstName] para exigir la comida más memorable a mis sobrecargados cocineros. \n\nHoy es mi [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('demander'))], [demander.GetFirstNameNoTooltip], quien babea: "Mi señor, ¡esta noche haré que las cocinas preparen la salsa más rica conocida por el hombre, servida con un asado de diez aves!", mientras se lame los labios con hambre. \n\n"
 court.8150.desc.almoner_chaplain:0 "Mi $high_almoner_court_position$, [high_almoner.GetTitledFirstName], y [chaplain.GetCouncilTitleFirstName] chasquean la lengua, sacudiendo la cabeza con desdén manifiesto."
 court.8150.desc.chaplain:0 "[chaplain.GetCouncilTitleFirstName] suspira con desaprobación: "Estos placeres fugaces no son nada comparados con la gracia de [chaplain.GetFaith.HighGodName]...""
 court.8150.desc.almoner:0 "[high_almoner.GetTitledFirstName], mi $high_almoner_court_position$, arruga la nariz, murmurando sobre los pobres hambrientos..."
 court.8150.a:0 "¡No puedo esperar!"
 court.8150.b:0 "Solo lo mejor para #EMP mi#! corte."
 court.8150.c:0 "¡Esta extravagancia ha ido demasiado lejos!"
 court.8150.d:0 "¿Nunca estaréis satisfechos?"
 # # Foremost Knight
 court.8160.t:0 "[ROOT.Char.Custom('MountedWarriorTerm')|U] principal"
 court.8160.desc.intro:0 "Es de esperar una sana rivalidad entre combatientes aguerridos, pero la creciente discordia entre [knight_1.GetFirstName] y [knight_2.GetFirstName] está agriando el ambiente en la corte. \n\nSe considera ampliamente que [knight_1.GetTitledFirstNameNoTooltip] tiene más habilidad, pero [knight_2.GetTitledFirstNameNoTooltip] claramente no está de acuerdo con tal afirmación. \n\nEn medio de una audiencia, este último irrumpe en mi sala del trono y, aferrando la empuñadura de su espada, grita: "¡[knight_1.GetFirstNameNoTooltip]! Solo uno de nosotros puede presumir de ser el [ROOT.Char.Custom('MountedWarriorTerm')] más hábil de [ROOT.Char.GetTitleAsNameNoTooltip]; ¡enfrentaos a mí afuera y zanjaremos la cuestión!"\n\n[knight_1.GetTitledFirstNameNoTooltip] responde [knight_2.Custom('quirk_neg_adverb')]: "¡Os cortaría en pedazos aquí mismo si no fuera por la presencia de mi [ROOT.Char.GetLadyLord], [knight_2.Custom('quirk_neg_adjective')] [knight_2.Custom('InsultNoun')]! ¡Disculpaos y quizás os perdone la vida!" \n\nSerá mejor que actúe rápido si quiero detener esta escalada..."
 court.8160.a:0 "Que gane mi mejor [ROOT.Char.Custom('MountedWarriorTerm')]."
 court.8160.a.tt_knight_1:0 "[knight_1.GetTitledFirstNameNoTooltip] gana el duelo"
 court.8160.a.tt_knight_2:0 "[knight_2.GetTitledFirstNameNoTooltip] gana el duelo"
 court.8160.b:0 "¡Quitadles las espadas! Dadles armas de entrenamiento."
 court.8160.c:0 "¡Os humillaré a ambos!"
 court.8160.c.tt:0 "Lucharéis en un combate singular contra el [knight|E] con más [prowess|E] ([knight_1.GetTitledFirstName])"
 court.8160.c.tt_win:0 "Salís victorioso"
 court.8160.c.tt_lose:0 "Sois derrotado"
 court.8160.d:0 "¡Estáis en el #EMP mismo#! bando!"
 court.8163.t:0 "Ganáis el duelo"
 court_humiliation_modifier:0 "Humillación en la corte"
 court_humiliation_modifier_desc:0 "Este personaje ha sido menospreciado frente a toda su corte."
 # # Pariah of Court
 court.8170.t:0 "Paria de la corte"
 court.8170.desc.intro_scary:0 "Los niños de la corte huyen cuando se acerca "[criminal.GetFirstName] el [criminal.Custom('GetCrime')|U]", e incluso los [ROOT.Char.GetFaith.BishopNeuterPlural] más fervientes no pueden evitar estremecerse ante su presencia."
 court.8170.desc.intro_sordid:0 ""[criminal.GetFirstName] el [criminal.Custom('GetCrime')|U]" es una figura de desdén en la corte, víctima del ostracismo social y blanco de muchos chistes sórdidos."
 court.8170.desc.intro_religious:0 "Se me juzga duramente por mi hospitalidad hacia "[criminal.GetFirstName] el [criminal.Custom('GetCrime')|U]", a quien casi todo el mundo evita debido a su fe impía."
 court.8170.desc.intro_fallback:0 "Mi corte no tolera excusas por mi hospitalidad hacia "[criminal.GetFirstName] el [criminal.Custom('GetCrime')|U]", a quien se ve como una aberración en un lugar por lo demás distinguido."
 court.8170.desc.body:0 "\n\nMi falta de condena y la continua proximidad a este [criminal.Custom('GetCrimeDesc')] se percibe como una tolerancia abierta, empañando la reputación de mi corte a ojos de los [ROOT.Char.GetFaith.AltPriestTermPlural] y los fieles...\n\nHan forzado mi mano, y ahora debo decidir si los crímenes de mi [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('criminal'))] pesan más que mi afecto por [criminal.GetHerHim]; sin duda, hay que hacer algo,"
 court.8170.desc.family:0 "incluso si [criminal.GetSheHe] pertenece a la casa [criminal.GetDynasty.GetNameNoTooltip]..."
 court.8170.desc.guest:0 "después de todo, [criminal.GetSheHe] no es más que un viajero."
 court.8170.desc.fallback:0 "¿tan difíciles son de reemplazar los cortesanos?"
 court.8170.a.family:0 "No; la familia es lo primero."
 court.8170.a.other:0 "No me corresponde a mí juzgar."
 court.8170.b:0 "¡Debéis arrepentiros, [criminal.GetFirstNameNoTooltip]!"
 court.8170.c:0 "Es hora de arrestar a la bestia."
 court.8170.d:0 "No puedo hospedaros más, [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('criminal'))]..."
 harbors_criminals_modifier:0 "Refugio de criminales"
 harbors_criminals_modifier_desc:0 "Este personaje no hace nada para llevar ante la justicia a los criminales de su propia corte."
  # # Secrets and Lies
 court.8180.t:0 "Secretos y mentiras"
 court.8180.desc.intro:0 "Pasan los días sin que se me pase por la cabeza, pero cada vez que me cruzo con la mirada de [criminal.GetTitledFirstName] en la corte, no puedo pensar en otra cosa que en sus crímenes. \n\nMe pregunto cuántos en la corte lo sabrán... ¿quizás nadie? Quizás todos... La verdad acabará saliendo a la luz, y no beneficiará a mi reputación tener tales escándalos entre mis cortesanos... \n\nHay que ocuparse de [criminal.GetHerHim], o tendré que rendir cuentas ante [ROOT.Char.GetFaith.HighGodName], por no hablar de la corte."
 court.8180.a:0 "Ya es suficiente. El mundo debe saberlo."
 court.8180.b:0 "Solo un necio no aprovecharía este conocimiento."
 court.8180.c:0 "[criminal.GetSheHe|U] debe ir a la mazmorra."
 court.8180.d:0 "Es hora de que se marche."
 court.8180.e:0 "Aún no es necesario actuar..."