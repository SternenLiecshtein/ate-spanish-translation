l_spanish:

 RICEmisc.0010.t:0 "Conversión"
 RICEmisc.0010.desc.host:0 "Debido a que me he convertido a  [host.GetFaith.GetName], el [activity_type.GetNameNoTooltip()] que había planeado originalmente ya no me sirve de mucho, ya que el evento en sí mismo o la forma en que se habría llevado a cabo no se ajusta a las nuevas enseñanzas que sigo. Por lo tanto, he cancelado este evento."
 RICEmisc.0010.desc.not_host:0 "Debido a que [host.GetTitledFirstName] se ha convertido en [host.GetFaith.GetName], el [activity_type.GetNameNoTooltip()] [host.GetSheHe] previsto inicialmente ha sido cancelado, ya que el evento en sí mismo o la forma en que se habría llevado a cabo no se ajusta a las nuevas enseñanzas que sigue [host.GetSheHe].\n\nEsto es, como mínimo, incómodo."
 RICEmisc.0010.a:0 "Y así es."
 
 mordvin.0020.t:0 "Productos apícolas"
 mordvin.0020.desc:0 "Durante siglos, la apicultura ha sido una parte importante de la economía y la cultura de América. Hay varios asentamientos en mi reino que mantienen estas tradiciones en la apicultura y, por lo tanto, son famosos por la calidad de sus productos apícolas.\n\n"
 mordvin.0020.desc.honey:0 "Por lo tanto, he ordenado a los apicultores de mi reino que preparen una gran cantidad de miel para enviarla a [recipient.GetTitledFirstName]. Además de su importancia como edulcorante en los alimentos, se dice que la miel tiene muchas propiedades medicinales."
 mordvin.0020.desc.beeswax:0 "«Por lo tanto, he ordenado a los apicultores de mi reino que preparen una gran cantidad de cera de abejas para enviarla a [recipient.GetTitledFirstName]. La cera de abejas es aún más lucrativa que la miel y tiene una gran variedad de usos prácticos, como la fabricación de velas o cosméticos."
 mordvin.0020.desc.honey_and_beeswax:0 "Por lo tanto, he ordenado a los apicultores de mi reino que preparen una gran cantidad de miel y cera de abeja para enviarla a [recipient.GetTitledFirstName]. BAmbos productos tienen múltiples aplicaciones, ¡y estoy seguro de que [recipient.GetFirstNameNoTooltip] les dará un buen uso!"
 mordvin.0020.a:0 "Espero [recipient.GetSheHe] aprecie este regalo!"
 mordvin.0021.opening:0 "[actor.Custom2('AppropriateGreeting', recipient)]"
 mordvin.0021.desc.honey:0 "Deseo presentar con esta carta un regalo, miel de gran calidad de mi reino."
 mordvin.0021.desc.beeswax:0 "Deseo presentar con esta carta un regalo, cera de abejas de gran calidad de mi reino."
 mordvin.0021.desc.honey_and_beeswax:0 "Deseo presentar con esta carta un regalo, miel y cera de abejas de gran calidad de mi reino."
 mordvin.0021.desc:0 "Ruego que acepten este regalo, que representa el esfuerzo y tradición apícola de mis pueblos."
 mordvin.0021.a:0 "¡Magnífico!"
 mordvin.0022.t:0 "$mordvin.0020.t$"
 mordvin.0022.desc:0 "$mordvin.0020.desc$"
 mordvin.0022.desc.honey:0 "He decidido comprar una gran cantidad de miel a los apicultores de mi reino. Además de su importancia como edulcorante en los alimentos, se dice que la miel tiene muchas propiedades medicinales."
 mordvin.0022.desc.beeswax:0 "He decidido comprar una gran cantidad de cera de abejas a los apicultores de mi reino. La cera de abejas es aún más lucrativa que la miel y tiene una gran variedad de usos prácticos, como la fabricación de velas o cosméticos."
 mordvin.0022.desc.honey_and_beeswax:0 "He decidido comprar una gran cantidad de miel y cera de abejas a los apicultores de mi reino. Ambos productos tienen múltiples aplicaciones, ¡y estoy seguro de que [recipient.GetFirstNameNoTooltip] les dará un buen uso!"
 mordvin.0022.a:0 "Muy bien."
 mordvin.0023.t:0 "Homenaje adicional de los apicultores"
 mordvin.0023.desc:0 "Durante generaciones, la apicultura ha sido una parte importante de la vida de los pueblos originarios de las tierras que gobierno. Tengo la gran suerte de que en mi reino hay algunos asentamientos que continúan con estas tradiciones. Los productos apícolas que producen, como la miel y la cera de abejas, se venden a precios elevados en los mercados extranjeros, lo que nos reporta mucha riqueza e ingresos fiscales.\n\nSin embargo, a veces, los impuestos que pagan estos apicultores no son suficientes.A veces, necesitamos más.\n\nPor lo tanto, he ordenado a los apicultores de mi reino que nos proporcionen este año más tributos de los que normalmente les pido. Ya obtienen muchos beneficios del comercio y tienen varios privilegios asociados a él, por lo que exigirles un poco más de tributos seguramente no les hará daño."
 mordvin.0023.a:0 "¡Es una oferta realmente #italic dulce#! para mí!"
 #Actividades en aguas termales
 RICEmisc.0011.t:0 "El viaje comienza"
 RICEmisc.0011.desc:0 "Es hora de comenzar el viaje a  [ROOT.Char.GetTravelPlan.GetData.GetNextDestination.GetProvince.GetName] para la[ROOT.Char.GetInvolvedActivity.GetShortName]. Estoy seguro de que el dolor de cabeza y las molestias de organizar este viaje merecerán la pena al final, cuando lleguemos a nuestro destino... o al menos eso espero, porque si no, todo este estrés por preparar el viaje habrá sido en vano."
 RICEmisc.0011.a:0 "Pasamos por estas molestias por una buena razón."
 RICEmisc.0012.t:0 "The Natural Springs of [ROOT.Char.GetInvolvedActivity.GetCurrentPhase.GetLocation.GetName]"
 RICEmisc.0012.desc:0 "We have just arrived at one of the local hot springs in [ROOT.Char.GetInvolvedActivity.GetCurrentPhase.GetLocation.GetName]."
 RICEmisc.0012.desc.hot_springs:0 "Soaking up the warm waters is quite the enjoyable experience!\n\n"
 RICEmisc.0012.desc.mineral_springs:0 "The sparkling waters leave a tingling sensation on my tongue and skin, and the air is taken by exotic, earthen aromas.\n\n"
 RICEmisc.0012.desc.private:0 "I feel like I've rarely feel this at ease in my daily life. I close my eyes and relax, as all my worries leave my mind, even if for just a moment."
 RICEmisc.0012.desc.public:0 "While here, I also take time to chat with some of the locals, and meet with a few prominent notables from the area. It's good to socialize while relaxing like this."
 RICEmisc.0012.desc.conclusion:0 "It's a pity that this visit will only last so long, so I'll try to make the most of it while I'm here."
 RICEmisc.0012.a:0 "I'm glad I came here."
 RICEmisc.0012.b:0 "If only I could stay a little longer..."
 
