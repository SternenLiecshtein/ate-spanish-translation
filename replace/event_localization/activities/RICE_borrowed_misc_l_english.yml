 game_concept_hot_springs_desc:0 "The [GetActivityType( 'activity_RICE_hot_springs_visit' ).GetName] is a type of [activity|E] available to many [rulers|E] as a way to lose [stress|E] and improve [health|E]. It has two [activity_options|E]: whether the visit will be a more public, high-profile event, or a private, low-profile affair instead."

