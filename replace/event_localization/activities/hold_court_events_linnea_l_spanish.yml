l_spanish:

 hold_court.5001.t:0 "$hold_court_header$ Un emparejamiento desdichado"
 hold_court.5001.desc_opening:0 "[complainer.Custom2('MyCharacterIntroduction', ROOT.Char)|U] se presenta ante mí solicitando que anule su compromiso con [complainer_betrothed.Custom2('MyCharacterIntroduction', ROOT.Char)].\n\n«[complainer_betrothed.GetSheHe|U] "
 hold_court.5001.desc_bad_fame:0 "ha cometido actos terribles»,"
 hold_court.5001.desc_bad_habits:0 "tiene una personalidad de lo más desagradable»,"
 hold_court.5001.desc_bad_health:0 "está consumiéndose por la enfermedad»,"
 hold_court.5001.desc_bad_genes:0 "carga con la maldición de un cuerpo débil»,"
 hold_court.5001.desc_bad_traits:0 "se deja llevar por el pecado»,"
 hold_court.5001.desc_fallback_1:0 "no es una pareja adecuada»,"
 hold_court.5001.desc_quirk:0 "«[complainer_betrothed.GetSheHe|U] siempre se comporta de forma tan [complainer_betrothed.Custom('quirk_neg_adjective')]»,"
 hold_court.5001.desc_ugly:0 "«¡y para colmo es alguien horrible de ver!»"
 hold_court.5001.desc_old:0 "«¡y para colmo es demasiado #EMP viejo#!!»"
 hold_court.5001.desc_young:0 "«¡y para colmo no es más que un niño!»"
 hold_court.5001.desc_fallback_2:0 "«¡y para colmo es alguien insoportable!»"
 hold_court.5001.desc_ending:0 "«Por favor, liberadme de esta obligación, mi [ROOT.Char.GetLadyLord]»."
 hold_court.5001.a:0 "Lo comprendo. Quedas libre de [complainer_betrothed.GetHerHim]."
 hold_court.5001.b:0 "Un acuerdo es un acuerdo."
 hold_court.5001.b_close_family:0 "¡Estás hablando de mi #EMP [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('complainer_betrothed'))]#!!"
 hold_court.5001.c:0 "¡Entonces no te casarás #EMP nunca#!."

 hold_court.5010.t:0 "$hold_court_header$ [county.GetNameNoTierNoTooltip] fuera de control"
 hold_court.5010.desc_marshal:0 "«El [marshal.GetCouncilTitle] [marshal.GetTitledFirstName] nos está colgando, nos acosa... nosotros... nosotros podríamos mantener el orden, mi [ROOT.Char.GetLadyLord]. ¡#EMP Por favor#!, ¡podemos organizarnos sin tanta muerte!»\n\n"
 hold_court.5010.desc:0 "«Nos están colgando, nos acosan... nosotros... nosotros podríamos mantener el orden, mi [ROOT.Char.GetLadyLord]. ¡#EMP Por favor#!, ¡podemos organizarnos sin tanta muerte!»\n\n"
 hold_court.5010.desc_vassal_holder:0 "[peasant.GetWomanMan|U] de [county.GetName], una zona plagada de disturbios bajo el mando de mi [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('vassal'))] [vassal.GetTitledFirstName], me asegura que el control puede restaurarse sin un derramamiento de sangre innecesario."
 hold_court.5010.desc_holder:0 "[peasant.GetWomanMan|U] de [county.GetName], una zona plagada de disturbios, me asegura que el control puede restaurarse sin un derramamiento de sangre innecesario."
 hold_court.5010.a:0 "Es una idea curiosa, probémosla."
 hold_court.5010.a_tt_marshal:0 "Le ordenas a [marshal.GetTitledFirstNameNoTooltip] que afloje un poco con la soga."
 hold_court.5010.a_tt_vassal:0 "Le ordenas a [vassal.GetTitledFirstNameNoTooltip] que afloje un poco con la soga."
 hold_court.5010.b:0 "Tienes razón, ¡lo que necesitamos es un derramamiento de sangre #EMP excesivo#!!"
 hold_court.5010.c:0 "Toma, haz lo que puedas con esto."

 hold_court.5020.t:0 "$hold_court_header$ Baile en [province.GetNameNoTooltip]"
 hold_court.5020.desc_opening:0 "Traen ante mí a [peasant.GetWomanMan] del [province.GetHolding.GetType.GetName|l] de [province.GetName] y, por mucho que se esfuercen los guardias, [peasant.GetSheHe] no deja de bailar, dejando un rastro de sangre de sus pies destrozados.\n\n«¡No puedo parar, mi [ROOT.Char.GetLadyLord]! Ninguno de nosotros puede, no hasta que caigamos desplomados. ¡Por favor, ayudadnos!»\n\n"
 hold_court.5020.desc_physician:0 "[court_physician.Custom2('MyCharacterIntroduction', ROOT.Char)|U] está seguro de que los ciudadanos sufren un exceso de sangre que causa un desequilibrio en los humores."
 hold_court.5020.desc_chaplain_intro_1:0 "[court_chaplain.Custom2('MyCharacterIntroduction', ROOT.Char)|U], por otro lado,"
 hold_court.5020.desc_chaplain_intro_2:0 "[court_chaplain.Custom2('MyCharacterIntroduction', ROOT.Char)|U]"
 hold_court.5020.desc_christian_john:0 "insiste en que es una maldición enviada por San Juan el Bautista para castigar a los campesinos."
 hold_court.5020.desc_christian_vitus:0 "insiste en que es una maldición enviada por San Vito para castigar a los campesinos."
 hold_court.5020.desc_god:0 "insiste en que es una maldición enviada por [ROOT.Char.GetFaith.FateGodName] para castigar a los campesinos."
 hold_court.5020.desc_no_physician:0 "La manía del baile se ha extendido por el [province.GetHolding.GetType.GetName|l], sin dejar a nadie ocioso o quieto."
 hold_court.5020.a:0 "¿Bailar? ¡Suena encantador! Siguiente."
 hold_court.5020.b:0 "Rezad por vuestra salvación y [ROOT.Char.GetFaith.FateGodName] seguramente os responderá."
 hold_court.5020.b_saint:0 "Rezad por vuestra salvación en un santuario dedicado al santo."
 hold_court.5020.c:0 "¡Traed las sanguijuelas! Tenemos humores que equilibrar."
 hold_court.5020.d:0 "¡Solo podemos combatir el baile con #EMP más baile#!!"
 hold_court.5020.d_tt:0 "Envías a tu músico de la corte a tocar para los afligidos."

 hold_court.5030.t:0 "$hold_court_header$ Lenguaje escrito"
 hold_court.5030.desc:0 "[courtier.Custom2('MyCharacterIntroduction', ROOT.Char)|U] me muestra una página llena de símbolos desconocidos, insistiendo en que es legible.\n\n«He desarrollado un lenguaje escrito específicamente para las [courtier.GetWomenMen] de la corte, ya que las letras suelen enseñarse solo a los [courtier.Custom('WomenMenOpp')]. ¡Si me lo permitís, empezaré a enseñárselo a las [courtier.Custom('LadiesLords')] de inmediato!»"
 hold_court.5030.desc_you:0 "\n\n¡No puedo evitar imaginar la libertad que otorgaría un lenguaje así!"
 hold_court.5030.a:0 "¡Qué idea tan fantástica!"
 hold_court.5030.courtiers:0 "Todos los cortesanos [courtier.Custom('FemaleMale')]"
 hold_court.5030.b:0 "Tu tutor de la corte, [court_tutor.GetFirstNameNoTooltip], te ayudará con las lecciones."
 hold_court.5030.c:0 "¡Podemos dar un mejor uso a vuestro talento!"