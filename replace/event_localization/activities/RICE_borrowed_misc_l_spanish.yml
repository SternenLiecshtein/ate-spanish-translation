 # Definiciones de Actividad
 activity_RICE_hot_springs_visit_host_an_a:0 "$host_activity_a$"
 activity_RICE_hot_springs_visit:0 "Visita a manantiales naturales"
 activity_RICE_hot_springs_visit_desc:0 "Existen manantiales notables en este mundo, cada uno con propiedades únicas. Debería visitar alguno para liberar el estrés, despejar mi mente de las preocupaciones diarias y, de paso, tratar mis dolencias físicas."
 activity_RICE_hot_springs_visit_selection_tooltip: "Relájate en unos [hot_springs|E] locales.\n\n$activity_RICE_hot_springs_visit_context_tooltip$"
 activity_RICE_hot_springs_visit_context_tooltip: "#emphasis Contexto histórico:#! Los manantiales suelen tener un origen geotérmico. Han sido utilizados por la humanidad durante milenios, y tradicionalmente se cree que poseen propiedades curativas o terapéuticas."
 activity_RICE_hot_springs_visit_host_desc: "\n$BULLET_WITH_TAB$Pierdes [stress_loss_i|E] de [stress|E]\n$BULLET_WITH_TAB$Otros beneficios potenciales según la ubicación"
 activity_RICE_hot_springs_visit_guest_desc: "$activity_RICE_hot_springs_visit_host_desc$"
 activity_RICE_hot_springs_visit_province_desc: "\n - Los [hot_springs|E] de aquí no son muy conocidos, pero bastarán para relajarse.\n#weak Esto resultará en una menor pérdida de [stress|E] y no otorgará bonos especiales."
 activity_RICE_hot_springs_visit_hot_springs_desc: "\n - Estos [hot_springs|E] son famosos por sus aguas cálidas, ¡en algunos casos casi hirvientes!\n#weak Esto otorgará una bonificación a la pérdida de [stress|E]."
 activity_RICE_hot_springs_visit_mineral_springs_desc: "\n - Estos [hot_springs|E] son famosos por sus aguas minerales y efervescentes.\n#weak Esto otorgará resistencia contra enfermedades y penalizaciones de salud."
 activity_RICE_hot_springs_visit_destination_selection: ""
 activity_RICE_hot_springs_visit_guest_help_text: "$activity_RICE_hot_springs_visit$"
 activity_RICE_hot_springs_visit_predicted_cost: "El coste de visitar unos [hot_springs|E] depende de las [activity_options|E] seleccionadas."
 activity_RICE_hot_springs_visit_conclusion_desc: "La [GetActivityType( 'activity_RICE_hot_springs_visit' ).GetName] ha terminado. ¡Ha sido una experiencia revitalizante!"

 # Opciones de Actividad
 RICE_hot_springs_visit_type: "Tipo de visita"
 RICE_hot_springs_visit_type_public: "Pública"
 RICE_hot_springs_visit_type_public_desc: "$EFFECT_LIST_BULLET$ Un viaje de alto perfil. Los lugareños harán todo lo posible para que tu estancia sea agradable.\n$EFFECT_LIST_BULLET$ Ganarás más [prestige|E] que en una visita privada, pero perderás menos [stress|E].\n\n#weak ¿Qué es el descanso sin la compañía de otros? Solo alguien socialmente inepto evitaría la gente a la hora de divertirse.#!"
 RICE_hot_springs_visit_type_private: "Privada"
 RICE_hot_springs_visit_type_private_desc: "$EFFECT_LIST_BULLET$ Un viaje discreto y privado. Evitarás llamar la atención para descansar en paz.\n$EFFECT_LIST_BULLET$ Perderás más [stress|E] que en una visita pública, pero ganarás menos [prestige|E].\n\n#weak Quienes necesitan a otros para divertirse no están cómodos consigo mismos. Es mejor relajarse en un entorno tranquilo y pacífico.#!"
 RICE_hot_springs_visit_leisure_phase: "Ocio"
 RICE_hot_springs_visit_leisure_phase_desc: "¡Es hora de disfrutar de los manantiales!"
 RICE_hot_springs_visit_relaxation_intent_header: "Relajación:"
 RICE_hot_springs_visit_relaxation_intent: "Relajación"
 RICE_hot_springs_visit_relaxation_intent_desc: "Te relajarás en los [hot_springs|E] de tu elección."
 RICE_hot_springs_visit_completed_log_title:0 "Visita a manantiales finalizada"
 RICE_hot_springs_visit_completed_log:0 "[CHARACTER.GetShortUIName|U] completó su visita a los [hot_springs|E] de [PROVINCE.GetBaronyNameExplicitly]"
 TRAVEL_NAME_FOR_activity_RICE_hot_springs_visit:0 "$activity_RICE_hot_springs_visit$ de [Character.GetFirstNameNoTooltip]"

 NOT_RICE_local_pilgrimage_county_req:0 "$RICE_hot_springs_county_req$"

 # Conceptos del Juego
 game_concept_hot_springs:0 "Manantiales naturales"
 game_concept_hot_spring:0 "Manantial natural"
 game_concept_hot_springs_desc:0 "La [GetActivityType( 'activity_RICE_hot_springs_visit' ).GetName] es un tipo de [activity|E] disponible para muchos [rulers|E] como forma de reducir el [stress|E] y mejorar la [health|E]. Tiene dos [activity_options|E]: si la visita será un evento público de alto perfil o una estancia privada y discreta."

