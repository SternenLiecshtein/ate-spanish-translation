l_spanish:
 # Conversión de Fe
 RICEmisc.0010.t:0 "Conversión"
 RICEmisc.0010.desc.host:0 "Debido a que me he convertido al [host.GetFaith.GetName], la [activity_type.GetNameNoTooltip()] que había planeado originalmente ya no me resulta apropiada. El evento en sí, o la forma en que se habría llevado a cabo, no se ajusta a las nuevas enseñanzas que sigo. Por lo tanto, he decidido cancelarlo."
 RICEmisc.0010.desc.not_host:0 "Debido a que [host.GetTitledFirstName] se ha convertido al [host.GetFaith.GetName], la [activity_type.GetNameNoTooltip()] que [host.GetSheHe] había previsto inicialmente ha sido cancelada. El evento no se ajusta a las nuevas enseñanzas que sigue [host.GetSheHe].\n\nEsto es, como mínimo, un tanto incómodo."
 RICEmisc.0010.a:0 "Sea como fuere."

 # Sistema de Apicultura (Basado en RICE Mordvin)
 mordvin.0020.t:0 "Frutos de la colmena"
 mordvin.0020.desc:0 "Durante siglos, la apicultura ha sido un pilar fundamental de la economía y la cultura en nuestras tierras. Varios asentamientos de mi reino mantienen vivas estas tradiciones y son célebres por la pureza de sus productos apícolas.\n\n"
 mordvin.0020.desc.honey:0 "Por ello, he ordenado a mis apicultores que preparen una gran remesa de miel para enviársela a [recipient.GetTitledFirstName]. Además de ser un edulcorante exquisito, se dice que posee grandes propiedades medicinales."
 mordvin.0020.desc.beeswax:0 "Por ello, he ordenado a mis apicultores que preparen una gran cantidad de cera de abejas para [recipient.GetTitledFirstName]. La cera es incluso más lucrativa que la miel y tiene multitud de usos, desde la fabricación de velas hasta cosméticos."
 mordvin.0020.desc.honey_and_beeswax:0 "Por ello, he ordenado a mis apicultores que preparen tanto miel como cera de abejas para [recipient.GetTitledFirstName]. ¡Ambos productos tienen múltiples aplicaciones y confío en que [recipient.GetFirstNameNoTooltip] les dará un buen uso!"
 mordvin.0020.a:0 "¡Espero que [recipient.GetSheHe] aprecie este regalo!"
 mordvin.0021.opening:0 "[actor.Custom2('AppropriateGreeting', recipient)]"
 mordvin.0021.desc.honey:0 "Deseo presentaros, mediante esta misiva, un regalo: miel de la más alta calidad cosechada en mis dominios."
 mordvin.0021.desc.beeswax:0 "Deseo presentaros, mediante esta misiva, un regalo: cera de abejas de gran calidad proveniente de mis dominios."
 mordvin.0021.desc.honey_and_beeswax:0 "Deseo presentaros, mediante esta misiva, un regalo: miel y cera de abejas de gran calidad de mis dominios."
 mordvin.0021.desc:0 "Ruego que aceptéis este presente, que representa el esfuerzo y la tradición apícola de mi pueblo."
 mordvin.0021.a:0 "¡Magnífico!"
 mordvin.0022.t:0 "$mordvin.0020.t$"
 mordvin.0022.desc:0 "$mordvin.0020.desc$"
 mordvin.0022.desc.honey:0 "He decidido adquirir una gran cantidad de miel de los apicultores locales. Además de su valor culinario, sus propiedades medicinales serán de gran ayuda."
 mordvin.0022.desc.beeswax:0 "He decidido adquirir una gran cantidad de cera de abejas de los apicultores locales. Es un producto sumamente práctico para la fabricación de velas y otros bienes de lujo."
 mordvin.0022.desc.honey_and_beeswax:0 "He decidido adquirir miel y cera de abejas de los apicultores locales. Ambos productos son sumamente versátiles y útiles para el reino."
 mordvin.0022.a:0 "Muy bien."
 mordvin.0023.t:0 "Homenaje adicional de los apicultores"
 mordvin.0023.desc:0 "Durante generaciones, la apicultura ha sido vital para los pueblos de estas tierras. Los productos que producen se venden a precios elevados en mercados extranjeros, reportándonos riqueza y jugosos ingresos fiscales.\n\nSin embargo, a veces las tasas ordinarias no son suficientes; a veces, la corona necesita un esfuerzo extra.\n\nHe ordenado que los apicultores entreguen este año un tributo mayor al habitual. Ya gozan de bastantes privilegios y beneficios gracias al comercio, por lo que exigirles un poco más no debería suponerles un gran perjuicio."
 mordvin.0023.a:0 "¡Es una oferta realmente #italic dulce#! para mí!"

 # Actividades en manantiales naturales
 RICEmisc.0011.t:0 "El viaje comienza"
 RICEmisc.0011.desc:0 "Es hora de partir hacia [ROOT.Char.GetTravelPlan.GetData.GetNextDestination.GetProvince.GetName] para asistir a la [ROOT.Char.GetInvolvedActivity.GetShortName]. Confío en que los dolores de cabeza de la organización merezcan la pena al llegar... Más vale que así sea, o todo este estrés habrá sido en vano."
 RICEmisc.0011.a:0 "El esfuerzo valdrá la pena."
 RICEmisc.0012.t:0 "Los manantiales de [ROOT.Char.GetInvolvedActivity.GetCurrentPhase.GetLocation.GetName]"
 RICEmisc.0012.desc:0 "Acabamos de llegar a uno de los manantiales naturales de [ROOT.Char.GetInvolvedActivity.GetCurrentPhase.GetLocation.GetName]."
 RICEmisc.0012.desc.hot_springs:0 "¡Sumergirse en estas aguas cálidas es una experiencia sumamente placentera!\n\n"
 RICEmisc.0012.desc.mineral_springs:0 "Las aguas efervescentes dejan una sensación de hormigueo en mi piel, y el aire está impregnado de aromas terrosos y exóticos.\n\n"
 RICEmisc.0012.desc.private:0 "Rara vez me siento tan a gusto en mi vida cotidiana. Cierro los ojos y me relajo mientras mis preocupaciones se desvanecen, aunque sea solo por un instante."
 RICEmisc.0012.desc.public:0 "Durante mi estancia, aprovecho para conversar con los lugareños y reunirme con algunos notables de la zona. Es gratificante socializar mientras uno descansa."
 RICEmisc.0012.desc.conclusion:0 "Es una lástima que esta visita tenga un límite de tiempo, así que intentaré aprovecharla al máximo mientras pueda."
 RICEmisc.0012.a:0 "Me alegra haber venido."
 RICEmisc.0012.b:0 "Si pudiera quedarme un poco más..."

