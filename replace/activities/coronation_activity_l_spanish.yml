l_spanish:
 # Base details
 activity_coronation: "Coronación"
 activity_coronation_host_desc: "$BULLET_WITH_TAB$@law_icon![GetLaw('crowned_king').GetName] o [GetLaw('crowned_emperor').GetName] [law|E]\n$BULLET_WITH_TAB$Mientras la coronación esté en curso, las @faction_icon![factions|E] no pueden enviar exigencias\n$BULLET_WITH_TAB$[opinion_i][opinion|E]\n$BULLET_WITH_TAB$[prestige_i][prestige|E]\n$BULLET_WITH_TAB$[legitimacy_i][legitimacy|E]\n$BULLET_WITH_TAB$Un potente [oath|E] de [decision|E]\n\n@warning_icon! #X Las @faction_icon![factions|E] y otros enemigos dañarán la [coronation_magnificence|E] de la coronación#!"
 activity_coronation_guest_desc: "$BULLET_WITH_TAB$ Quienes participen pueden ganar [opinion_i][opinion|E] de otros participantes\n$BULLET_WITH_TAB$Quienes participen pueden obtener oportunidades únicas basadas en su [intent|E]"
 activity_coronation_desc: "Invita a las personalidades más grandes y poderosas del reino para que sean testigos de tu ascenso al trono. Esto forjará los cimientos de un reinado largo y próspero."
 activity_coronation_conclusion_desc: "La [GetActivityType( 'activity_coronation' ).GetName] ha concluido."
 activity_coronation_selection_tooltip: "Invita a los grandes y poderosos del reino a presenciar tu ascensión al trono. Esto sentará las bases de un mandato largo y exitoso.\n\nRecompensas previstas:\n$activity_coronation_host_desc$"
 activity_coronation_destination_selection: "\nUna [coronation|E] normalmente debe celebrarse en el [realm|E] de quien ejerce de [host|E], a excepción de las [anointments|E] que pueden requerir celebrarse en tierras del [head_of_faith|E] si este posee [holy_sites|E] adecuados."
 activity_coronation_guest_help_text: "Una coronación es una gran oportunidad para forjar vínculos e impresionar tanto a [vassals|E] como a otros [rulers|E] por igual.\n\nCualquier invitado que participe en la coronación tendrá la oportunidad de aumentar la [opinion|E] de otros invitados, y podrá obtener oportunidades especiales para interactuar con quien ejerce de [host|E] de la [activity|E]."
 invite_to_activity_flavor_coronation: "Quedáis cordialmente [Character.Custom('ES_InvitadoInvitada')] a uniros a mí y al resto del reino en [ROOT.Char.GetCurrentLocation.Custom('GetCoronationSitePrefix')][ROOT.Char.GetCurrentLocation.Custom('GetCoronationSite')] para mi próxima coronación."
 activity_coronation_underage_tt: "#bold No#! tienes al menos #V 12#! años\n#flavor La corona se le resbala de la cabecita#!"
 activity_coronation_not_approved_anointment: "[GetPlayer.GetFaith.GetReligiousHead.GetTitledFirstName] no ha aprobado esta [anointment|E]; solicita su aprobación con la [interaction|E] de [request_anointment|E]"

 # Province Desc
 activity_coronation_province_desc: "La coronación se celebrará en [ROOT.Province.GetName]"
 activity_coronation_capital_province: "\n#p + Capital#!"
 activity_coronation_holy_site_province: "\n#p + Lugar santo#!"
 activity_coronation_tradition_province: "\n#p + Lugar tradicional de coronación#!"
 activity_coronation_long_tradition_province: "\n#p ++ Lugar tradicional de coronación#!"
 activity_coronation_ancient_tradition_province: "\n#p +++ Lugar tradicional de coronación#!"

 # Location Triggers
 coronation_location_owned: "No está en el [realm|E]"
 coronation_location_hof_owned: "[THIS.Province.GetName] #bol no#! es un [holy_site|E] en el [realm|E] de tu [head_of_faith|E]"
 coronation_location_holy_site_host: "[THIS.Province.GetName] #bol no#! es un [holy_site|E] en tu [realm|E] (tu [head_of_faith|E] no posee ningún [holy_site|E])"
 coronation_location_neither_capital_nor_holy_site: "[THIS.Province.GetName] #bol no#! es una [county_capital|E] ni un [holy_site|E]"

 # Fases
 coronation_phase_preparations: "Preludio"
 coronation_phase_preparations_desc: ""
 coronation_phase_coronation: "Ceremonia"
 coronation_phase_coronation_desc: ""
 coronation_phase_feast: "Banquete"
 coronation_phase_feast_desc: ""

 # Tipos
 coronation_type_normal: "Coronación"
 coronation_type_normal_desc: "$BULLET_WITH_TAB$Demuestra tu [legitimacy_i][legitimacy|E]\n$BULLET_WITH_TAB$Jura un [oath|E] y compromete el rumbo de tu reinado\n$BULLET_WITH_TAB$Puedes ganar [opinion_i][opinion|E] con los [vassals|E]\n$BULLET_WITH_TAB$Los [vassals|E] pueden abandonar las @faction_icon![factions|E]\n$BULLET_WITH_TAB$Puedes coronarte por tu cuenta para ganar [prestige_i][prestige|E] adicional\n\n#weak $coronation_type_normal_flavor$#!"
 coronation_type_normal_flavor: "Una ceremonia majestuosa demostrará la legitimidad de vuestro mandato, y la grandeza del reino será vuestro ropaje soberano."
 coronation_type_anointment: "Unción"
 coronation_type_anointment_desc: "$BULLET_WITH_TAB$Demuestra tu [legitimacy_i][legitimacy|E] más allá de toda duda\n$BULLET_WITH_TAB$Gana [piety_i][piety|E], @fervor_icon![fervor|E] y el favor de los [vassals|E] [GetVassalStance( 'zealot' ).GetName|U] [GetVassalStance( 'zealot' ).GetTextIcon]\n$BULLET_WITH_TAB$Jura un [oath|E] y compromete el rumbo de tu reinado\n$BULLET_WITH_TAB$Gana [opinion_i][opinion|E] con los [vassals|E] y otros [rulers|E]\n$BULLET_WITH_TAB$Los [vassals|E] pueden abandonar las @faction_icon![factions|E]\n$BULLET_WITH_TAB$@alert_icon! #alert_trial Debe celebrarse en un [holy_site|E] de tu [faith|E]#!\n\n#weak $coronation_type_anointment_flavor$#!"
 coronation_type_anointment_flavor: "Quien ostente la soberanía debe estar envuelto en un propósito sagrado e instaurado por el favor divino. La fuerza terrenal no es sustituto."

 # Options
 anointment_minimum: "[activity_option|E] no disponible para [anointment|E]"
 ceremony_size: "Ceremonia"
 coronation_small_ceremony: "Ritos sencillos"
 coronation_small_ceremony_desc: "$EFFECT_LIST_BULLET$Disminuye la [coronation_magnificence|E]\n$EFFECT_LIST_BULLET$Los [rulers|E] extranjeros no se unirán a la [activity|E]\n$EFFECT_LIST_BULLET$Si la [coronation_magnificence|E] es inferior a #high 50#! al concluir, ganarás [GetModifier('ach_coronation_low_ceremony_modifier').GetNameWithTooltip] durante #high 10 años#!\n\n#weak Ya ostento la soberanía, ¿no? ¿Para qué convocar a todos los reinos por este mero trámite?#!"
 coronation_medium_ceremony: "Gala tradicional"
 coronation_medium_ceremony_desc: "$EFFECT_LIST_BULLET$ Aumenta la [coronation_magnificence|E]\n$EFFECT_LIST_BULLET$ Es algo más probable que se unan los [activity_guests|E]\n\n#weak Los juramentos sagrados del mandato deben estar a la altura de un entorno regio y una vasta y reverente asamblea.#!"
 coronation_large_ceremony: "Gloria y esplendor"
 coronation_large_ceremony_desc: "$EFFECT_LIST_BULLET$ Aumenta significativamente la [coronation_magnificence|E]\n$EFFECT_LIST_BULLET$ Es mucho más probable que se unan los [activity_guests|E]\n\n#weak Entre reliquias sagradas y joyas relucientes, envuelto en una música hermosa, allí estarán mis parientes, mis vasallos y prestigiosos invitados de tierras lejanas.#!"
 ceremony_feast_type: "Celebraciones"
 ceremony_feast_type_austere: "Observancias austeras"
 ceremony_feast_type_austere_desc: "$EFFECT_LIST_BULLET$ Disminuye la [coronation_magnificence|E]\n$EFFECT_LIST_BULLET$Si la [coronation_magnificence|E] es inferior a #high 50#! al concluir, ganarás [GetModifier('ach_coronation_low_feast_modifier').GetNameWithTooltip] durante #high 10 años#!\n\n#weak ¿Acaso la invitación a esta ocasión histórica no es placer suficiente?#!"
 ceremony_feast_type_regular: "Festejos adecuados"
 ceremony_feast_type_regular_desc: "$EFFECT_LIST_BULLET$ Aumenta la [coronation_magnificence|E]\n\n#weak No se escatimará en la gran reunión de la nobleza ni en los manjares del banquete posterior a la ceremonia.#!"
 ceremony_feast_type_lavish: "Banquetes pródigos"
 ceremony_feast_type_lavish_desc: "$EFFECT_LIST_BULLET$ Aumenta significativamente la [coronation_magnificence|E]\n$EFFECT_LIST_BULLET$ Disminuye el riesgo de eventos negativos\n\n#weak Esperan un sinfín de manjares de aroma suntuoso; delicias magníficas para apuntalar la mesa real.#!"

 ach_coronation_low_ceremony_modifier: "Corona en la oscuridad"
 ach_coronation_low_ceremony_modifier_desc: "El pueblo llano apenas sabe que esta persona es realmente su señor, y la nobleza olvida con gusto sus mediocres ceremonias inaugurales."
 ach_coronation_low_feast_modifier: "Nobleza despreciada"
 ach_coronation_low_feast_modifier_desc: "Las celebraciones insultantemente escasas que rodearon la coronación de este gobernante dejaron a los asistentes rebosantes de desprecio y vacíos de buenos víveres."

 # Special Guests
 coronation_hof_guest: "Cabeza de la fe"
 coronation_hof_guest_desc: "$coronation_hof_guest_desc_for_host$"
 coronation_hof_guest_for_host: "Cabeza de la fe"
 coronation_hof_guest_desc_for_host: "En una [anointment|E], quien sea [head_of_faith|E] debe participar como [activity_guest|E] para que se considere [legitimate|E].\n\nAsegúrate el apoyo de la Cabeza de la fe con la [interaction|E] de [anointment_request|E]."

 # Doctrines related to Coronations
 doctrine_coronation_name: "Tradición de coronación"
 doctrine_no_anointment_name: "Sin unción"
 doctrine_no_anointment_desc: "En esta fe, ningún aceite sagrado toca la frente de los gobernantes; el suyo es un camino al poder sin unciones ni ritos divinos."
 doctrine_anointment_permitted_name: "Unción permitida"
 doctrine_anointment_permitted_desc: "Incluso los emperadores no se inclinan ante un único ritual; aunque la Cabeza de la fe pueda presidir, la elección de la coronación recae en el propio trono."
 doctrine_imperial_anointment_name: "Unción imperial"
 doctrine_imperial_anointment_desc: "Para gobernar como emperador más allá de toda duda, hay que arrodillaros; pues solo la Cabeza de la fe puede otorgar esa autoridad final e incuestionable."
 doctrine_parameter_no_anointment: "Los [characters|E] no tienen acceso a la [activity_option|E] de [coronation_anointment|E]"
 doctrine_parameter_theocratic_coronation: "Los [characters|E] tienen acceso a la [activity_option|E] de [coronation_anointment|E]"
 doctrine_parameter_imperial_anointment: "Los [characters|E] de [title_tier|E] de [empire|E] o superior deben usar la [activity_option|E] de [coronation_anointment|E] para recibir la [law|E] de [GetLaw('crowned_emperor').GetName]"

 # Costs
 CORONATION_BASE_COST: "Coste base de [GetActivityType( 'activity_coronation' ).GetName]"

