# Recompensas de actividad del anfitrión

coronation_events.0310.t: "La intención del [ROOT.Char.GetTitleAsNamePossessiveNoTooltip]"
coronation_events.0310.desc.high_magnificence: "He trabajado incansablemente para promover la gloria y fomentar la grandeza de mi coronación. Los invitados están pletóricos, inspirados por lo que han presenciado aquí, y radian admiración. Ha sido un comienzo digno para mi reinado como [ROOT.Char.GetTitleAsNameNoTooltip|l].\n\n"
coronation_events.0310.desc.mid_magnificence: "Ahora soy un [ROOT.Char.GetTitleAsNameNoTooltip|l] como es debido. Mi coronación ha demostrado estar a la altura de mi rango; un buen espectáculo para los invitados, muchos de los cuales aún merodean con la esperanza de escuchar unas últimas palabras [ROOT.Char.Custom('GetTitleTierAdjective')].\n\n"
coronation_events.0310.desc.low_magnificence: "Las celebraciones llegan a su fin. Hubo muchos susurros sobre el caos, la tensión y los servicios improvisados. Puede que ahora me encuentre con calumnias resonando en mis oídos y comida vieja y rancia en mi vientre... pero lo único que importa es que al fin soy un [ROOT.Char.GetTitleAsNameNoTooltip|l] de pleno derecho.\n\n"
coronation_events.0310.desc.impress_attendees: "¡Desde el principio hasta el fin, no escatimé esfuerzos para impresionar a todos los asistentes, amigos y enemigos por igual! Pero mi presencia ecuánime, mi enfoque absoluto en el éxito de esta gran reunión...\n\n¿Para qué sirvió todo esto?"
coronation_events.0310.desc.weaken_detractors: "Impertinentes y [first_char.Custom('InsultAdjective')] detractores, con [first_char.GetName] y [second_char.GetName] entre ellos, tuvieron la audacia de asistir a mi coronación... ¡y los recibí con la bilis [ROOT.Char.Custom('GetTitleTierAdjective')] que se merecen! Vinieron para buscar mis debilidades, pero solo encontraron un desprecio gélido y una resolución de hierro.\n\nQuizás debería asestar un último golpe mordaz..."
coronation_events.0310.desc.embrace_supporters: "Aproveché cada oportunidad para favorecer a los más leales a mí y a mi corona. Juntos, mis partidarios y yo hemos conspirado, planeado y ensalzado las credenciales de los demás. [first_char.GetName], [second_char.GetName] y los otros se han convertido en mi círculo íntimo.\n\nSu confianza podría transformarse en algo mucho más sustancial."
coronation_events.0310.desc.exalt_crown: "Me mantuve fiel a mi creencia de que la gloria de la corona lo es todo. Las pruebas que enfrenté en este lugar, las mezquinas luchas internas... son problemas pasajeros, ¡pero [ROOT.Char.GetPrimaryTitle.GetNameNoTier] perdurará! He transmitido esta gran convicción a mis invitados, y su fe en el reino ha crecido.\n\nPero, ¿a qué fin conduce toda esta exaltación?"
