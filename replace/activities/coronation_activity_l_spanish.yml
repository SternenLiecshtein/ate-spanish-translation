 coronation_tributary_value: "Coronación del suzerano: $VALUE|=+0$"
 coronation_hof_supported_anointment: "La [head_of_faith|E] apoya la [anointment|E]: $VALUE|=+0$"

 # Laws for Coronation
 crowned_laws: "Leyes de coronación"
 uncrowned: "Sin coronar"
 crowned_king: "Soberanía coronada"
 crowned_emperor: "Soberanía ungida"
 can_only_be_passed_through_coronation: "Solo se puede obtener celebrando una [GetActivityType( 'activity_coronation' ).GetName]"
 requires_anointment_coronation: "Solo se puede obtener mediante una [anointment|E]"
 can_only_be_lost_through_losing_titles: "Ya bajo corona"
 already_better_coronation: "Ya bajo unción"
 already_coronated_trigger: "Ya bajo corona"
 coronation_no_crown_trigger: "Se necesita el [artifact|E] corona"
 coronation_no_regalia_trigger: "Se necesita el [artifact|E] insignias reales"
 coronation_no_crown_or_regalia_trigger: "Se necesita el [artifact|E] corona o insignias reales"

 ## Intents
 # Host Intents
 coronation_impress_attendees: "Impresionar a los asistentes"
 coronation_impress_attendees_desc: "Serás la viva imagen de la soberanía, ganando [legitimacy|E], [cultural_acceptance|E] y [coronation_i][coronation_magnificence|E].\n#EMP #low Este [intent|E] complace a los [vassals|E] [GetVassalStance( 'courtly' ).GetTextIcon][GetVassalStance( 'courtly' ).GetName] y [GetVassalStance( 'minority' ).GetTextIcon][GetVassalStance( 'minority' ).GetName].#!#!"
 coronation_embrace_supporters: "Acoger a los partidarios"
 coronation_embrace_supporters_desc: "Tu régimen se construirá sobre la lealtad, colaborando para ganar [prestige|E], formar [relations|E] y enriquecer tus [realms|E].\n#EMP #low Este [intent|E] complace a los [coronation_supporters|E], especialmente a los [vassals|E] [GetVassalStance( 'glory_hound' ).GetTextIcon][GetVassalStance( 'glory_hound' ).GetName] y [GetVassalStance( 'zealot' ).GetTextIcon][GetVassalStance( 'zealot' ).GetName].#!#!"
 coronation_weaken_detractors: "Debilitar a los detractores"
 coronation_weaken_detractors_desc: "Con tu coronación comienza la caída de los [claimants|E] y la ruptura de [factions|E] y confederaciones.\n#EMP #low Este [intent|E] daña a los [coronation_detractors|E] y complace a los [vassals|E] [GetVassalStance( 'belligerent' ).GetTextIcon][GetVassalStance( 'belligerent' ).GetName] que no sean detractores.#!#!"
 coronation_exalt_crown: "Exaltar la Corona"
 coronation_exalt_crown_desc: "La reverencia por tu mandato dota a los lugares de [coronation|E], [artifacts|E] y [oaths|E] de beneficios duraderos como [dynasty_prestige|E].\n#EMP #low Este [intent|E] complace a los [vassals|E] [GetVassalStance( 'parochial' ).GetTextIcon][GetVassalStance( 'parochial' ).GetName].#!#!"
 # Guest Intents
 coronation_bear_witness: "Dar testimonio"
 coronation_bear_witness_desc: "Al asistir a esta ocasión histórica, esperas disfrutar de [piety|E], [legitimacy|E] y [cultural_acceptance|E]."
 coronation_seize_advantages: "Aprovechar ventajas"
 coronation_seize_advantages_desc: "[SelectLocalization( GetPlayer.GetGovernment.HasGovernmentFlag( 'government_is_administrative' ), 'seize_advantages_admin', 'seize_advantages_non_admin' )]"
 seize_advantages_admin: "Mantienes la atención puesta en cualquier oportunidad para asegurar [gold|E], [influence|E] o [claims|E]."
 seize_advantages_non_admin: "Mantienes la atención puesta en cualquier oportunidad para asegurar [gold|E], [prestige|E] o [claims|E]."
 coronation_offer_support: "Ofrecer apoyo"
 coronation_offer_support_desc: "Al dar un apoyo firme a la corona, esperas ganar [opinion|E], una [relation|E] o una [alliance|E] con quien la porta."
 coronation_advocate_domain: "Abogar por el dominio"
 coronation_advocate_domain_desc: "Presionas a tu soberanía para que adopte políticas que fomenten el [development|E], el [control|E] y la [county_opinion|E] en tu sub-[realm|E]."
 coronation_profess_rights: "Manifestar derechos"
 coronation_profess_rights_desc: "Te mantienes firmemente en tu sitio, exigiendo un [hook|E] de favor o una mejora del [vassal_contract|E] a tu señor."
 coronation_disrupt_loyalists: "Perturbar a los leales"
 coronation_disrupt_loyalists_desc: "Buscas reducir la [coronation_i][coronation_magnificence|E] de la coronación, aumentar las [factions|E] y su [discontent|E], y crear problemas para quien ejerce de [activity_host|E] y sus [coronation_supporters|E]."

