 coronation_events.0200.t: "El preludio"
 coronation_events.0200.desc.host: "Los invitados han llegado. De cerca y de lejos, por lealtad o curiosidad. La multitud crece con rostros marcados por la expectativa, el cálculo y, en algunos casos, un ligero afecto.\n\nAlzo mi voz lo justo para calmar a los asistentes y darles la bienvenida a mi coronación."
 coronation_events.0200.desc.guest: "La reunión es tan grandiosa como se esperaba. Se mezclan rostros familiares y extranjeros, y oigo saludos lo bastante cálidos como para resultar corteses. Cuando la anfitrionía habla, la sala se aquieta por instinto.\n\n«Amigos míos, mis vasallos, mis parientes, vuestra presencia me honra más de lo que cualquier corona podría hacerlo. Hasta que comience la ceremonia, comed, bebed, hablad con libertad... y sabed que veo a cada uno de vosotros, y no olvidaré quién estuvo aquí conmigo hoy».\n\nUna amable promesa, o una advertencia silenciosa, según cómo cada uno decida interpretarla."
 coronation_events.0200.a: "¡Bienvenidos sean todos!"
 coronation_events.0200.b: "Veamos, ¿quién más anda por aquí?"

 coronation_events.0205.t: "La ceremonia"
 coronation_events.0205.meager: "Todos los preparativos han concluido. La modesta asamblea ceremonial aguarda en"
 coronation_events.0205.great: "Todos los preparativos han concluido. La gran asamblea ceremonial aguarda ahora en"
 coronation_events.0205.hagia_sophia: "Santa Sofía, el lugar de la Santa Sabiduría de Dios."
 coronation_events.0205.st_peters: "la Basílica de San Pedro, el hogar del vicario principal de Cristo."
 coronation_events.0205.saint_denis: "la Basílica de Saint-Denis, tumba del patrón del pueblo francés."
 coronation_events.0205.westminster: "la elegante Abadía de Westminster."
 coronation_events.0205.reims: "Nuestra Señora de Reims, esa catedral de reyes."
 coronation_events.0205.aachen: "el histórico palacio de Carlomagno en [location.GetTitle.NameNoTier]."
 coronation_events.0205.wawel: "la Catedral de Wawel, hermosa y eterna."
 coronation_events.0205.temple: "la gran [host.GetFaith.HouseOfWorship] de [location.GetTitle.GetNameNoTierPossessive]."
 coronation_events.0205.silence: "\n\nEn un gélido silencio,"
 coronation_events.0205.cheers: "\n\nEntre vítores y exaltación,"
 coronation_events.0205.desc.host: "mi procesión divide a la muchedumbre de la [ROOT.Char.Custom('SettlementCity')|l]: mis mejores [ROOT.Char.Custom('KnightCulturePluralNoTooltipLowercase')] cabalgan ante mí, mi séquito de [ROOT.Char.Custom('GetTitleTierAdjective')] me sigue."
 coronation_events.0205.desc.guest: "la procesión de [host.GetTitledFirstNamePossessive] divide a la multitud, y mi comitiva le sigue en nuestro lugar de honor."
 coronation_events.0205.desc.low_magnificence: "Algunos [host.Custom('GetLocalCommonerTermPlural')] nos miran inexpresivos; otros murmuran con escarnio. Uno grita: #EMP «¡El falso [host.GetTitleAsName]!»#! y la turba se abalanza, apenas contenida por los pocos [host.Custom('GetFighterTermPlural')] que bordean el camino."
 coronation_events.0205.desc.medium_magnificence: "Los [host.Custom('GetLocalCommonerTermPlural')|U] se agolpan para vislumbrar a quien pronto será [host.GetTitleAsNameNoTooltip|l]. Sobre los hombros de sus padres, entre la multitud, los niños de cultura [location.GetCulture.GetName] sonríen."
 coronation_events.0205.desc.high_magnificence: "¡Resuenan los cuernos! ¡Ondean los estandartes con los vivos colores de [host.GetPrimaryTitle.GetAdjective]! Los [host.Custom('GetLocalCommonerTermPlural')|U] aclaman a quien ostenta la [host.GetTitleAsNameNoTooltip|l], y las mujeres lloran de éxtasis ante este glorioso desfile."

 coronation_events.0205.a_low_magnificence: "¡[ROOT.Char.GetFaith.HighGodName], guíame a través de esta chusma...!"
 coronation_events.0205.a_high_magnificence: "¡Y mi coronación #EMP ¡apenas acaba de empezar!#!"
 coronation_events.0205.a: "El más grande de los momentos se aproxima."
 coronation_events.0205.b: "Este [ROOT.Char.GetTitleAsNameNoTooltip|l] debe de ser una visión espantosa..."
 coronation_events.0205.b_flavor_infirm: "...con apenas vida en [ROOT.Char.GetHerHim] para cabalgar hacia su coronación."
 coronation_events.0205.b_improved: "¡Pero, por fortuna, pocos se darán cuenta entre tanto esplendor!"
 coronation_events.0205.c_low_magnificence: "¡Mirad más de cerca, palurdos! Soy, en cada fibra, un [activity.GetHost.GetTitleAsNameNoTooltip|l]."
 coronation_events.0205.c: "¡Soy la viva imagen de un gran [activity.GetHost.GetTitleAsNameNoTooltip|l]!"
 coronation_events.0205.d: "Ahora veremos la talla de este [activity.GetHost.GetTitleAsNameNoTooltip]."
 coronation_events.0205.e: "El brillo de mi moneda restaurará el esplendor de hoy."
 coronation_events.0205.e.tt: "Se trae un [ROOT.Char.CustomFixedRandom('GetKnightErrantAnimal')] ataviado con telas de oro; se hace fluir [ROOT.Char.CustomFixedRandom('GetExpensiveDrink_Singular')] de cada fuente; los músicos, sentados ante el pabellón, cantan a tu gloria."
 coronation_events.0205.e.toast: "[host.GetShortUIName] no escatimó en gastos para la ceremonia"
 coronation_events.0205.f: "El pueblo sabe quién es su [ROOT.Char.GetTitleAsNameNoTooltip]."
 coronation_events.0205.f.tt: "Pronuncias un discurso verdaderamente conmovedor ante el pueblo."
 coronation_events.0205.f.success: "La audiencia queda asombrada"
 coronation_events.0205.f.failure: "Tus esfuerzos son en vano"
 coronation_events.0205.f.toast: "[host.GetShortUIName] pronunció un discurso motivador"
 
 coronation_events.0210.t: "El banquete"
 coronation_events.0210.desc.host: "La ceremonia ha terminado y la corona descansa donde debe. Me pongo en pie una vez más, no para mandar, sino para ofrecer lo que sigue.\n\n«Amigos míos, los ritos han concluido. Que se llenen las mesas, que se alcen las copas y que esta sala recuerde tanto la alegría como el deber».\n\nEsto me gana un murmullo de aprobación, quizás incluso algo parecido al afecto. Por ahora, al menos, todos tienen algo frente a ellos que no soy yo."
 coronation_events.0210.desc.guest: "Las formalidades han terminado y, con ellas, la quietud que dominaba la reunión. Surgen algunos murmuros cuando el anfitrión se levanta de nuevo, esta vez para marcar el fin de la ceremonia y el inicio de algo más distendido.\n\nAlza la voz lo justo para que se le oiga: «Amigos míos, los ritos han concluido. Que se llenen las mesas, que se alcen las copas y que esta sala recuerde tanto la alegría como el deber».\n\nLas palabras son bien recibidas y, por primera vez en todo el día, la reunión empieza a parecer una celebración."
 coronation_events.0210.a: "¡Dejando eso a un lado, es hora de celebrar!"
 coronation_events.0210.b: "Al fin, la ceremonia ha terminado."

 coronation_events.0300.t: "Una posición de honor"
 coronation_events.0300.desc: "Antes de que la coronación pueda proseguir, debo decidir quién presidirá los ritos sagrados. Si quiero asegurar el favor de los [ROOT.Char.GetFaith.AltPriestTermPlural|U], sería sabio dejar que uno de los suyos supervise la ceremonia, otorgándole la santidad y bendición que solo ellos pueden proveer.\n\nSin embargo, una parte de mí se pregunta: ¿no sería una historia más grandiosa si tomara la corona con mis propias manos, declarando mi derecho a gobernar ante todos sin intercesión alguna?"
 coronation_events.0300.a: "[chaplain.GetFirstNameNoTooltip] es el único que puede hacerlo."
 coronation_events_0300_a_tooltip: "[chaplain.GetFirstName] oficiará la ceremonia"
 coronation_events.0300.b: "¿Quizás [alternative_1.GetFirstNameNoTooltip]?"
 coronation_events_0300_b_tooltip: "[alternative_1.GetFirstName] oficiará la ceremonia"
 coronation_events.0300.c: "Tengo fe en [alternative_2.GetFirstNameNoTooltip]."
 coronation_events_0300_c_tooltip: "[alternative_2.GetFirstName] oficiará la ceremonia"
 coronation_events.0300.d: "Es un honor que solo puede recaer en mí."
 coronation_events_0300_d_tooltip: "#high ¡Tú!#! serás quien oficie la ceremonia"
 coronation_events_0300_d_tooltip_effect: "Ganarás @prestige_icon![prestige|E], pero perderás @opinion_icon![opinion|E] con tu [court_chaplain|E] y tus [vassals|E] [GetVassalStance( 'zealot' ).GetTextIcon][GetVassalStance( 'zealot' ).GetName|U] según la [coronation_magnificence|E] de tu [coronation|E]"
 coronation_events_0300_d_tooltip_effect_hof: "Ganarás @prestige_icon![prestige|E], pero perderás @opinion_icon![opinion|E] con tu [head_of_faith|E] y tus [vassals|E] [GetVassalStance( 'zealot' ).GetTextIcon][GetVassalStance( 'zealot' ).GetName|U] según la [coronation_magnificence|E] de tu [coronation|E]"

 coronation_events.0301.t: "Muerte del oficiante"
 coronation_events.0301.desc: "El oficiante de mi coronación, mi [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('dead_officiator'))] [dead_officiator.GetFirstName], [dead_officiator.GetDeathReason]. Su asiento está vacío y el ritual sagrado incompleto.\n\n[first_candidate.GetFirstName], un respetado [first_candidate.GetFaith.PriestNeuter] de fe [first_candidate.GetFaith.GetAdherentName], da un paso al frente. «[first_candidate.GetFaith.HighGodName] no vacila con el paso de una sola alma», dice solemnemente. «Si así lo deseáis, yo completaré el rito»."
 coronation_events.0301.a: "San [ROOT.Char.Custom('GetCatholicSaint')], encomienda su alma a la [ROOT.Char.GetFaith.PositiveAfterLife]."
 coronation_events.0301.a.tooltip: "[first_candidate.GetFirstNameNoTooltip] será el nuevo oficiante de la ceremonia"
 coronation_events.0301.a.c: "No dejaré que su muerte detenga la ceremonia."
 coronation_events.0301.b: "[second_candidate.GetTitledFirstNameNoTooltip] está más cerca de [first_candidate.GetFaith.HighGodName]."
 coronation_events.0301.b.tooltip: "[second_candidate.GetFirstNameNoTooltip] será el nuevo oficiante de la ceremonia"
 coronation_events.0301.c: "Merece mi mayor respeto. Cancelad las ceremonias."
 coronation_events.0301.c.tooltip: "#N @warning_icon! Tu [activity|E] de [coronation|E] será cancelada.#!"
 coronation_events.0301.c.tooltip_second: "Podrás organizar un [funeral|E] para [dead_officiator.GetFirstName]."
 coronation_events.0301.c.tooltip_third: "Podrás organizar la [coronation|E] de nuevo inmediatamente después del [funeral|E]."
 coronation_events.0301.d: "No dejaré que una muerte detenga #EMP mi#! coronación."
 coronation_events.0301.d.tooltip: "[first_candidate.GetFirstNameNoTooltip] será el nuevo oficiante. La muerte de [dead_officiator.GetTitledFirstNamePossessive] durante tu coronación se considera un augurio nefasto para tu reinado."
 coronation_events.0301.e: "[first_candidate.GetFaith.HighGodName] da y [first_candidate.GetFaith.HighGodName] quita."
 coronation_events.0301.e.tooltip: "#N @warning_icon! Tu [activity|E] de [coronation|E] será cancelada.#!"
 coronation_events.0301.e.tooltip_second: "No podrás organizar otra coronación durante los próximos 12 meses."

