 martial_oath_2_tooltip: "Haces un [oath|E] para #V Expandir el reino#!:\n\t$EFFECT_LIST_BULLET$El [realm|E] debe tener un tamaño de al menos [host.MakeScope.ScriptValue('oath_conquest_value_1')|V0] #low (Actualmente [host.MakeScope.ScriptValue('oath_conquest_value_2')|V0])#!\n$EFFECT_LIST_BULLET$Debe completarse en un plazo de #V 20 años#!\n$EFFECT_LIST_BULLET$Elige entre una mejora para la [capital|E] o la integración de tierras por [de_jure|E] shifting\n$EFFECT_LIST_BULLET$Recompensas: [legitimacy_i][legitimacy|E], [prestige_i][prestige|E] y [GetModifier('oath_of_conquest').GetNameWithTooltip]"
