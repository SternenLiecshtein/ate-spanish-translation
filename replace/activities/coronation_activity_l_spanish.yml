 activity_coronation_special_type_title: "#UND Magnificencia#!"
 activity_coronation_special_type_desc: "#T Magnificencia#!\n$game_concept_coronation_magnificence_desc$"
 CORONATION_WINDOW_SPECIAL_PROGRESS_TOOLTIP: "[coronation_magnificence|E]: [ActivityWindow.GetSpecialProgressValue|0^V]"
 activity_coronation_special_type_bar_segment_tt_0: "#T Coronación pobre#!\n$activity_coronation_special_type_bar_segment_tt_0_effects$\n$activity_coronation_special_type_bar_segment_tt_0_flavor$"
 activity_coronation_special_type_bar_segment_tt_0_effects: ""
 activity_coronation_special_type_bar_segment_tt_0_flavor: "#weak Una coronación pobre, un intento lamentable de impresionar... pocos sienten que haya servido para apuntalar convincentemente al nuevo monarca.#!"
 activity_coronation_special_type_bar_segment_tt_1: "#T Coronación modesta#!\n$activity_coronation_special_type_bar_segment_tt_1_effects$\n$activity_coronation_special_type_bar_segment_tt_1_flavor$"
 activity_coronation_special_type_bar_segment_tt_1_effects: "[CoronationRewardProgress('(CFixedPoint)25', 'activity_coronation_special_type_bar_segment_tt_1_progress')]$BULLET$Recompensa de [oath|E] de [legitimacy_i][legitimacy|E] y [prestige_i][prestige|E]: #P +25%#!\n$BULLET$Ganancia de [opinion|E] de [vassal|E] e [guest|E] por intención: #P +5#!\n"
 activity_coronation_special_type_bar_segment_tt_1_progress: "[coronation_magnificence|E]: #V [ActivityWindow.GetSpecialProgressValue|0]/25#!\n"
 activity_coronation_special_type_bar_segment_tt_1_flavor: "#weak Pocos hablaron de la modesta ceremonia una vez pasado el día; no causó ofensa, pero tampoco conmovió el corazón.#!"
 activity_coronation_special_type_bar_segment_tt_2: "#T Coronación respetable#!\n$activity_coronation_special_type_bar_segment_tt_2_effects$\n$activity_coronation_special_type_bar_segment_tt_2_flavor$"
 activity_coronation_special_type_bar_segment_tt_2_effects: "[CoronationRewardProgress('(CFixedPoint)50', 'activity_coronation_special_type_bar_segment_tt_2_progress')]$BULLET$Recompensa de actividad de [legitimacy_i][legitimacy|E] y [prestige_i][prestige|E]: #P +50%#!\n$BULLET$Recompensa de [oath|E] de [legitimacy_i][legitimacy|E] y [prestige_i][prestige|E]: #P +50%#!\n$BULLET$Ganancia de [opinion|E] de [vassal|E] e [guest|E] por intención: #P +10#!\n"
 activity_coronation_special_type_bar_segment_tt_2_progress: "[coronation_magnificence|E]: #V [ActivityWindow.GetSpecialProgressValue|0]/50#!\n"
 activity_coronation_special_type_bar_segment_tt_2_flavor: "#weak La coronación se recordó con elogios comedidos; una ceremonia digna de un gobernante, aunque no inspirara canciones.#!"
 activity_coronation_special_type_bar_segment_tt_3: "#T Coronación grandiosa#!\n$activity_coronation_special_type_bar_segment_tt_3_effects$\n$activity_coronation_special_type_bar_segment_tt_3_flavor$"
 activity_coronation_special_type_bar_segment_tt_3_effects: "[CoronationRewardProgress('(CFixedPoint)75', 'activity_coronation_special_type_bar_segment_tt_3_progress')]$BULLET$Recompensa de actividad de [legitimacy_i][legitimacy|E] y [prestige_i][prestige|E]: #P +75%#!\n$BULLET$Recompensa de [oath|E] de [legitimacy_i][legitimacy|E] y [prestige_i][prestige|E]: #P +75%#!\n$BULLET$Ganancia de [opinion|E] de [vassal|E] e [guest|E] por intención: #P +15#!\n"
 activity_coronation_special_type_bar_segment_tt_3_progress: "[coronation_magnificence|E]: #V [ActivityWindow.GetSpecialProgressValue|0]/75#!\n"
 activity_coronation_special_type_bar_segment_tt_3_flavor: "#weak La coronación perduró en la memoria; su pompa y ritos solemnes se mencionaban a menudo en salones nobles y reuniones cortesanas.#!"
 activity_coronation_special_type_bar_segment_tt_4: "#T Coronación resplandeciente#!\n$activity_coronation_special_type_bar_segment_tt_4_effects$\n$activity_coronation_special_type_bar_segment_tt_4_flavor$"
 activity_coronation_special_type_bar_segment_tt_4_effects: "[CoronationRewardProgress('(CFixedPoint)100', 'activity_coronation_special_type_bar_segment_tt_4_progress')]$BULLET$Recompensa de actividad de [legitimacy_i][legitimacy|E] y [prestige_i][prestige|E]: #P +150%#!\n$BULLET$Recompensa de [oath|E] de [legitimacy_i][legitimacy|E] y [prestige_i][prestige|E]: #P +100%#!\n$BULLET$Ganancia de [opinion|E] de [vassal|E] e [guest|E] por intención: #P +20#!\n"
 activity_coronation_special_type_bar_segment_tt_4_progress: "[coronation_magnificence|E]: #V [ActivityWindow.GetSpecialProgressValue|0]/100#!\n"
 activity_coronation_special_type_bar_segment_tt_4_flavor: "#weak Los relatos de la ceremonia se extendieron por doquier; su magnificencia quedó grabada en canciones, escrituras y en los corazones de todos los que la presenciaron.#!"

