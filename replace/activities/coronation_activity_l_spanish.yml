 coronation_events.0110.t: "El Juramento"
 coronation_events.0110.desc.intro: "[activity.GetHost.GetFirstName] permanece a solas frente a la multitud, mientras todos esperan su juramento.\n\n"
 ## Diplomacy
 coronation_events.0110.desc.diplomacy_oath_1: "#emp «Ningún reino prospera en soledad. El poder no reside solo en los ejércitos, sino en los vínculos de confianza, en pactos forjados con la palabra y la voluntad.\n\nDesde [activity.GetHost.GetCapitalLocation.GetName], extenderé la mano de la amistad, tejiendo alianzas que salvaguardarán [activity.GetHost.GetPrimaryTitle.GetNameNoTier] durante las generaciones venideras».#!"
 coronation_events.0110.desc.diplomacy_oath_2: "#emp «La fuerza de un reino no reside solo en las alianzas ganadas, sino en la promesa silenciosa de continuidad. Al asegurar que la casa [activity.GetHost.GetHouse.GetName] perdure, dotaré al reino de unos cimientos tan firmes como la roca.\n\nA través de nuestra descendencia, el linaje de los [activity.GetHost.GetHouse.GetName] se mantendrá intacto, preservando la estabilidad y guiando a nuestro reino a través de todo lo que esté por venir».#!"
 ## Martial
 coronation_events.0110.desc.martial_oath_1: "#emp «Hoy me alzo no solo para gobernar, sino para construir. No solo para preservar lo que es, sino para crear lo que podría ser. [activity.GetHost.GetPrimaryTitle.GetNameNoTier] no puede limitarse a la memoria o a un mapa; debe crecer.\n\nPor nuestro futuro y por el futuro de nuestro pueblo».#!"
 coronation_events.0110.desc.martial_oath_2: "#emp «Durante demasiado tiempo, tierras que pertenecen a [activity.GetHost.GetPrimaryTitle.GetNameNoTier] han sufrido el mandato de manos menores. De aquellos que confundieron la posesión con la legitimidad.\n\nEso termina ahora. Desde [activity.GetHost.GetCapitalLocation.GetName], conocerán el verdadero gobierno. Por mi mano».#!"
 ## Stewardship
 coronation_events.0110.desc.stewardship_oath_1: "#emp «Quien gobierne debe hacer algo más que defender fronteras: debe hacer que la vida dentro de ellas valga la pena. Guardaré la paz, cuidaré del reino y no planearé para la guerra, sino para el crecimiento.\n\nDesde [activity.GetHost.GetCapitalLocation.GetName], guiaré a [activity.GetHost.GetPrimaryTitle.GetNameNoTier] a través de una nueva edad de oro».#!"
 coronation_events.0110.desc.stewardship_oath_2: "#emp «No todos los legados nacen en la guerra. Algunos se tallan en piedra, con sudor y propósito. Rediseñaré [activity.GetHost.GetPrimaryTitle.GetNameNoTier] con monumentos dignos del futuro.\n\nDesde [activity.GetHost.GetCapitalLocation.GetName], levantaré un reino no solo para que perdure, sino uno que entre en una edad de oro moldeada por el cuidado y la visión».#!"
 ## Intrigue

 ## Learning
 coronation_events.0110.desc.learning_oath_1: "#emp «Que nadie confunda la ignorancia con la fuerza. Un reino guiado por el conocimiento sobrevivirá a cualquiera construido solo sobre el miedo.\n\nDesde [activity.GetHost.GetCapitalLocation.GetName], reuniré a las mejores mentes y, a través de su consejo, daré forma al futuro de [activity.GetHost.GetPrimaryTitle.GetNameNoTier]».#!"
 ## Purge Pretenders
 coronation_events.0110.desc.purge_pretenders_oath: "#emp «Los falsos pretendientes a [ROOT.Char.GetPrimaryTitle.GetName] se han multiplicado como ratas en las alcantarillas. Y como alimañas que son, todos deben ser exterminados».#!"
 ## End the Struggle
 coronation_events.0110.desc.end_the_struggle_oath: "#emp «La [GetPlayer.MakeScope.Var('end_the_struggle_oath_type_var').Struggle.GetName] ha desangrado lentamente a generaciones de buenos [ROOT.Char.GetCulture.GetCollectiveNoun]. No más. Pondré un fin definitivo a este desperdicio inútil de recursos y marcaré el comienzo de una nueva era de prosperidad conjunta en la región, con la ayuda de [ROOT.Char.GetFaith.GetName]».#!"
 ## Greatest Hunter
 coronation_events.0110.desc.greatest_hunter_oath: "#emp «La caza no es solo una prueba de habilidad, sino una celebración de la vida y la naturaleza. Me convertiré en el más grande de los cazadores, maestro de las tierras salvajes, el verdadero soberano de los dominios indómitos de [ROOT.Char.GetPrimaryTitle.GetNameNoTier]».#!"
 ## Heir Preparation
 coronation_events.0110.desc.heir_preparation_oath: "#emp «Sin un heredero adecuado, la dinastía [ROOT.Char.GetDynasty.GetName] está condenada al olvido. Guiaré la educación de mi heredero, inculcando los valores y la sabiduría necesarios para elevar a la dinastía [ROOT.Char.GetDynasty.GetName] a nuevas cotas».#!"
 ## Install Claimants
 coronation_events.0110.desc.install_claimants_oath: "#emp «El derecho legítimo al trono no es solo una cuestión de sangre, sino de justicia. Instauraré a los legítimos pretendientes en sus tronos, derrocando a los usurpadores y restaurando el orden».#!"
 ## Mend the Fracture
 coronation_events.0110.desc.mend_the_fracture_oath: "#emp «La fractura cultural del reino ha causado conflictos durante demasiado tiempo. Uniré a los pueblos bajo el estandarte común de los [ROOT.Char.GetHouse.GetName], manteniendo intactas sus identidades».#!"
 ## Provide for the Warriors
 coronation_events.0110.desc.provide_for_the_warriors_oath: "#emp «Los guerreros de [activity.GetHost.GetPrimaryTitle.GetNameNoTier] son mi espada y mi escudo. Me aseguraré de que estén bien equipados y listos para defender nuestras tierras».#!"
 ## Provide for the Faithful
 coronation_events.0110.desc.provide_for_the_faithful_oath: "#emp «Los fieles de [activity.GetHost.GetPrimaryTitle.GetNameNoTier] son la columna vertebral de mi reino. Me aseguraré de que sus necesidades terrenales estén cubiertas y les permitiré centrarse en ser devotos sirvientes de [ROOT.Char.GetFaith.HighGodName], dedicados a la salvación de mi [ROOT.Char.GetPrimaryTitle.GetTierAsNamePossessive]».#!"
 ## Provide for the Poor
 coronation_events.0110.desc.provide_for_the_poor_oath: "#emp «Los pobres de [activity.GetHost.GetPrimaryTitle.GetNameNoTier] son la sal de la tierra, la luz del mundo. Trabajan en silencio para el beneficio de todos. Me aseguraré de que incluso el más humilde de mi reino pueda vivir con dignidad y esperanza».#!"
 ## Repent
 coronation_events.0110.desc.repent_oath: "#emp «¿Qué puede cambiar la naturaleza de [ROOT.Char.GetWomanMan]? ¿Basta con mi voluntad? ¿Podré convencer a otros [ROOT.Char.GetFaith.GetAdherentNamePlural], podré convencer a [ROOT.Char.GetFaith.HighGodName] de que realmente me arrepiento de mis pecados? Podría ser una necedad intentarlo, pero sería el pecado más grave no hacerlo».#!"

 ## Other
 coronation_events.0110.desc.fallback: "#emp «Mi mandato será recordado por quienes vengan después como el inicio de una edad de oro para [activity.GetHost.GetPrimaryTitle.GetNameNoTier]».#!"
 coronation_events.0110.desc.outro: ""
 coronation_events.0110.regular: "Veremos si puede estar a la altura de las expectativas..."
 coronation_events.0110.no_oath: "Qué decepción..."

 coronation_events.0150.t: "Juramento quebrantado: [SCOPE.Custom('GetOathSpecific')|V]"
 coronation_events.0150.desc: "Oigo sus susurros tras las puertas cerradas. Veo la decepción grabada en sus ojos. Y siento el peso de la vergüenza oprimiéndome.\n\nTodos lo saben: he fallado. He roto el juramento que juré defender, una promesa que hice a todos mis súbditos.\n\n¿Cómo les miro a la cara ahora? ¿Cómo cargo con esta deshonra?"
 coronation_events.0150.desc_honest: "El poder vino acompañado de la promesa. Me planté ante el reino y pronuncié un juramento en el que creyeron... un juramento en el que #emp yo#! creía.\n\nAhora el trono se siente más como una tumba que como un asiento. Una jaula fría y dorada que se burla de mí con cada suspiro. Y lo peor es saber que todo es culpa mía."
 coronation_events.0150.desc_deceitful: "Que susurren. Que miren con su orgullo herido y su vana decepción. Lo veo. Siento su juicio como una hoja en mi espalda.\n\n¿Pero vergüenza? No, la vergüenza es para quienes pretendían cumplir sus promesas.\n\nUn juramento solo es sagrado para los necios."
 coronation_events.0150.a: "Una vergüenza..."
 coronation_events.0150.a_honest: "¿Cómo podré vivir con este deshonor?"
 coronation_events.0150.a_deceitful: "Es lo que hay."
 coronation_events.150.custom_list_tooltip: "Cada [vassal|E], [courtier|E] o [guest|E]"

 coronation_events.0175.t: "Juramento cumplido: [SCOPE.Custom('GetOathSpecific')|V]"
 coronation_events.0175.desc: "Mi labor ha concluido, exactamente como dije que sería. Escuché el desprecio de mis detractores, su certeza de que fallaría al prestar juramento.\n\nPero les demostré que se equivocaban. Las voces de los incrédulos han cambiado y ahora me otorgan el honor que antes creían fuera de mi alcance.\n\nUn nuevo día se alza ante nosotros..."
 coronation_events.0175.a: "¡Y un [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip] más fuerte aguarda para recibirlo!"

 ## Diplomacy
 diplomacy_oath_1_tooltip: "Haces un [oath|E] para #V Asegurar alianzas#!:\n\t$EFFECT_LIST_BULLET$Debes tener al menos #V 3#! [alliances|E] con [rulers|E] que:\n\t\t$EFFECT_LIST_BULLET$Tengan al menos #V 50#! de [opinion|E] sobre #V ti#!\n\t\t$EFFECT_LIST_BULLET$Cumplan uno de los siguientes requisitos:\n\t\t\t$EFFECT_LIST_BULLET$Un [title_tier|E] inferior\n\t\t\t$EFFECT_LIST_BULLET$El mismo [title_tier|E]\n\t\t\t$EFFECT_LIST_BULLET$Un [title_tier|E] superior\n\t$EFFECT_LIST_BULLET$Debe completarse en un plazo de #V 20 años#!\n\t$EFFECT_LIST_BULLET$Recompensas: [legitimacy_i][legitimacy|E], [prestige_i][prestige|E], [opinion_i][opinion|E], [cultural_acceptance_i][cultural_acceptance|E] y [GetModifier('oath_of_alliances').GetNameWithTooltip]"
 diplomacy_oath_2_tooltip: "Haces un [oath|E] para #V Fortalecer la casa#!:\n\t$EFFECT_LIST_BULLET$Debes tener al menos #V 7#! [children|E] [legitimate|E] #weak (Actualmente [host.MakeScope.ScriptValue('children_oath_value')|V0]/#V 7#!)#!\n\t$EFFECT_LIST_BULLET$Debe completarse en un plazo de #V 30 años#!\n\t$EFFECT_LIST_BULLET$Recompensas: [legitimacy_i][legitimacy|E], [prestige_i][prestige|E], [dynasty_prestige_i][dynasty_prestige|E] y [GetModifier('oath_of_children').GetNameWithTooltip]"
 ## Martial
 martial_oath_1_tooltip: "Haces un [oath|E] para #V Consolidar [host.GetPrimaryTitle.GetNameNoTierNoTooltip]#!:\n\t$EFFECT_LIST_BULLET$[host.GetPrimaryTitle.GetName] debe tener el [completely_control|E] de sus fronteras [de_jure|E] #low (Actualmente [host.MakeScope.ScriptValue('oath_reconquest_value_1')|V0]/[host.MakeScope.ScriptValue('oath_reconquest_value_2')|V0])#!\n$EFFECT_LIST_BULLET$Debe completarse en un plazo de #V 20 años#!\n$EFFECT_LIST_BULLET$Recompensas: [legitimacy_i][legitimacy|E], [prestige_i][prestige|E] y [GetModifier('oath_of_reconquest').GetNameWithTooltip]"
