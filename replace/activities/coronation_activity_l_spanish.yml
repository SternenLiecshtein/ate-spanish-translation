 ### Events
 # Oaths
 coronation_events.0100.t: "Un juramento para la posteridad"
 # Intro
 coronation_events.0100.desc.opening: "La asamblea me observa. Algunos con esperanza, otros con duda, todos esperando a que hable de mi reinado y jure ante el futuro. Puedo oír las preguntas que callan. ¿Seré alguien justo? ¿Seré imparcial?"
 # Mid section
 coronation_events.0100.desc.previous_ruler_close_family: "¿Estaré a la altura de mi [ROOT.Char.Custom2( 'RelationToMeShort', previous_ruler )]?"
 coronation_events.0100.desc.previous_ruler_not_family_no_house: "¿Superaré a mi predecesor, [previous_ruler.GetFirstNameNicknamed]?"
 coronation_events.0100.desc.previous_ruler_not_family: "¿Superaré a mi predecesor, [previous_ruler.GetFirstName] [previous_ruler.GetHouse.GetName]?"
 coronation_events.0100.desc.first_ruler: "¿Cómo gobernaré siendo el primer [ROOT.Char.GetTitleAsNameNoTooltip|l] de estas tierras?"
 # Outro
 coronation_events.0100.desc.outro: "\n\nNo estoy aquí, como [ROOT.Char.GetTitleAsName], para hacerme eco de sus expectativas. He venido a elegir mi propio camino y un rumbo a seguir para el [ROOT.Char.GetPrimaryTitle.GetTierAsNameNoTooltip|l].\n\nEn lo que sea que [ROOT.Char.GetPrimaryTitle.GetNameNoTier] se convierta —en lo que sea que yo me convierta— comienza en este preciso momento."
