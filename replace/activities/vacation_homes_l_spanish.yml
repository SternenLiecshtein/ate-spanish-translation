 granada.0070.t:0 "Comienzan las vacaciones"
 granada.0070.desc:0 "Ya estoy en mi #italic residencia de recreo#! para la excursión con mi corte. Me aseguré de llegar temprano para que todo estuviera listo. Según llegan los primeros invitados, los recibo con hospitalidad antes de mostrarles el interior.\n\nDurante los próximos días disfrutaremos de toda clase de diversiones. Algunos anfitriones prefieren deslumbrar con las vistas; otros, de inclinación más culta, prefieren discusiones intelectuales o recitales de poesía. Otros, simplemente, querrán darse un festín.\n\nPor supuesto, yo ya he decidido qué haremos."
 granada.0070.a:0 "Disfrutemos de la belleza de los jardines y las vistas."
 granada.0070.a.tooltip.1:0 "Ganarás [prestige|E] o [piety|E], y tus #italic residencias de recreo#! podrían ganar fama por su encanto estético."
 granada.0070.a.tooltip.2:0 "Los invitados introvertidos o reservados disfrutarán más de esta actividad."
 granada.0070.b:0 "Entreguémonos a la poesía y al discurso intelectual."
 granada.0070.b.tooltip.1:0 "Ganarás [piety|E], y tus #italic residencias de recreo#! podrían ganar fama por atraer a eruditos y poetas elocuentes."
 granada.0070.b.tooltip.2:0 "Los invitados intelectuales y reflexivos disfrutarán más de esta actividad."
 granada.0070.c:0 "¡Démonos un festín y olvidemos las penas!"
 granada.0070.c.tooltip.1:0 "Ganarás [prestige|E], y tus #italic residencias de recreo#! podrían ganar fama por sus fiestas animadas."
 granada.0070.c.tooltip.2:0 "Los invitados extrovertidos y sociables disfrutarán más de esta actividad."

 granada.0071.t:0 "Comienzan las vacaciones"
 granada.0071.desc:0 "Por fin he llegado a la #italic residencia de recreo#! de [host.GetTitledFirstName]. [host.GetSheHe] sale a recibirnos personalmente para darnos la bienvenida.\n\nAunque muchos aristócratas poseen villas como esta, siempre es interesante ver las ajenas. Algunas se centran en el deleite visual, otras cultivan un aire de sofisticación con poetas y eruditos. Sea como sea, una vez que lleguen todos, ¿quién sabe qué diversiones nos aguardan?"
 granada.0071.a:0 "Me pregunto cuál será nuestro itinerario."

 granada.0072.t:0 "Fin de las vacaciones"
 granada.0072.desc:0 "Todo lo bueno acaba. Tras un banquete final anoche, partimos en esta hermosa mañana. Ha sido un placer y una distracción necesaria del estrés diario."
 granada.0072.a:0 "¡Espero con ansias la próxima excursión!"

 granada.0073.t:0 "Fin de las vacaciones"
 granada.0073.desc:0 "Las vacaciones con [host.GetTitledFirstName] han terminado. Tras días de ocio y un gran banquete final, debemos regresar a nuestras vidas. Ha sido un respiro magnífico."
 granada.0073.a:0 "Quizá yo debería organizar algo así en una de mis residencias."

 granada.0074.t:0 "Los jardines de mi residencia"
 granada.0074.desc:0 "He mostrado a mis invitados los mejores jardines de mi villa. Me he esforzado por llenarlos de plantas maravillosas y fuentes espléndidas alimentadas por canales desde el río cercano. Mis esfuerzos han valido la pena: veo el asombro en sus ojos mientras charlamos relajados entre la vegetación."
 granada.0074.a:0 "¡Me alegra que disfruten de los jardines!"
 granada.0074.a.title:0 "¡Tus invitados hablan maravillas de tus jardines!"

 granada.0075.t:0 "Los jardines de [host.GetTitledFirstNamePossessiveNoTooltip]"
 granada.0075.desc:0 "[host.GetTitledFirstName] nos ha mostrado sus mejores jardines y es evidente que siente un gran orgullo por ellos. Verlos de cerca es otra historia: flores exóticas, árboles majestuosos y canales refrescantes crean un ambiente único."
 granada.0075.a:0 "¡Me encanta socializar en lugares tan deliciosos!"
 granada.0075.a.title:0 "Disfrutas socializando en los jardines de la residencia"
 granada.0075.b:0 "Quiero relajarme y observar el paisaje."
 granada.0075.b.title:0 "Disfrutas inspeccionando los jardines de la residencia"

 granada.0076.t:0 "Una residencia culta"
 granada.0076.desc:0 "He invitado a eruditos y poetas locales. Veo a mis invitados participar en toda clase de actividades intelectuales: debates políticos, teológicos o concursos de poesía. Otros prefieren el ajedrez o leer en mi biblioteca."
 granada.0076.a:0 "En general, el ambiente aquí es muy refinado."
 granada.0076.a.title:0 "¡Tus invitados comentan tus inclinaciones cultas!"

 granada.0077.t:0 "Una residencia culta"
 granada.0077.desc:0 "[host.GetTitledFirstName] nos ha animado a participar en actividades intelectuales. Es la marca de [host.GetTitleAsNameNoTooltip] rodearse de cultura. Aunque no es la estancia más ruidosa, es un deleite para la mente."
 granada.0077.a:0 "Estas discusiones son iluminadoras."
 granada.0077.a.title:0 "Obtienes algunas ideas intelectuales"
 granada.0077.b:0 "La poesía nunca ha sido tan gratificante."
 granada.0077.b.title:0 "Ganas algunos concursos de poesía"
 granada.0077.c:0 "Disfruto jugando al ajedrez y leyendo aquí."
 granada.0077.c.title.1:0 "Encontraste un buen libro en la biblioteca"
 granada.0077.c.title.2:0 "Tus partidas de ajedrez resultan interesantes"

 granada.0078.t:0 "¡Fiesta en la residencia!"
 granada.0078.desc:0 "¡No tenemos tiempo para tediosos debates académicos! Estamos aquí para divertirnos. He proveído comida, bebida y música para que todos socialicen y disfruten de la vida al máximo."
 granada.0078.a:0 "¡No hay por qué estar triste, estamos aquí para pasarlo bien!"
 granada.0078.a.title:0 "¡Tus invitados hablan de tus fiestas increíbles!"

 granada.0079.t:0 "¡Fiesta en la residencia!"
 granada.0079.desc:0 "[host.GetTitledFirstName] nos ha ofrecido banquete tras banquete. Tiene un encanto especial ir de fiesta en una villa rural. He pasado el tiempo comiendo, bebiendo y disfrutando de la música."
 granada.0079.a:0 "¿Ya es hora del próximo festín?"
