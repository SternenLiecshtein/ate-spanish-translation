 RICE_granada_alhambra_munya_estate:0 "Veranear en una residencia de recreo"
 RICE_granada_alhambra_munya_estate_tooltip:0 "Necesito seriamente un descanso de la gran ciudad."
 RICE_granada_alhambra_munya_estate_desc:0 "Como cualquier [ROOT.Char.GetTitleAsNameNoTooltip] de California que se precie, poseo varias fincas de tipo [munya|E] en el campo, cerca de mi capital. Debería pasar tiempo en una de estas villas para relajarme, ya sea a solas o con otros."
 RICE_granada_alhambra_munya_estate_effect_tooltip_1:0 "Elegirás si visitar tu [munya|E] en soledad para descansar o estudiar las plantas, o invitar a otros como tus [courtiers|E] y [vassals|E] para socializar."
 RICE_granada_alhambra_munya_estate_effect_tooltip_2:0 "Podrás perder [stress|E] y ganar diversas bonificaciones como [lifestyle_experience|E] o [character_modifiers|E] positivos."
 RICE_granada_alhambra_munya_estate_effect_tooltip_3:0 "$RICE_granada_admire_alhambra_gardens_effect_tooltip_2$"
 RICE_granada_alhambra_munya_estate_confirm:0 "¡Es hora de ir al campo!"

 # Eventos
 granada.0050.t:0 "Planes vacacionales"
 granada.0050.desc:0 "Ha pasado demasiado tiempo desde la última vez que tuve la oportunidad de tomarme un descanso de mi ajetreada vida. Muchas personas de las clases privilegiadas y nobles de California tienen #italic casas vacacionales#! en el campo, donde pueden relajarse y pasar tiempo lejos de la ciudad. Creo que ya es hora de que vaya a una.\n\nPasar las vacaciones en una #italic casa vacacional#! no es solo para placeres frívolos, como haría alguien en las tierras de los no ilustrados. No, no. Estos lugares son también centros de experimentación agronómica y botánica, y espacios donde personas adecuadas y cultas se reúnen para participar en el discurso académico.\n\nEn fin, pronto participaré en una actividad de tipo [ROOT.Char.GetInvolvedActivity.GetShortName] en [ROOT.Char.GetTravelPlan.GetData.GetNextDestination.GetProvince.GetName]. ¡Hay muchas cosas divertidas que hacer en estas excursiones, sin importar la personalidad o los intereses de cada cual!"
 granada.0050.a:0 "Quiero pasar algo de tiempo a solas."
 granada.0050.a.tooltip:0 "Si vas de vacaciones a tu [munya|E] en soledad, es más probable que pierdas [stress|E]. Si lo deseas, también podrías aprender sobre los últimos avances en agronomía y botánica para mejorar tu reino."
 granada.0050.b:0 "¡Vayamos a divertirnos!"
 granada.0050.b.tooltip:0 "Si vas de vacaciones a tu [munya|E] con un grupo, tendrás más posibilidades de ganar [prestige|E] y [piety|E]. También podrías mejorar la [opinion|E] que los invitados tienen de ti y la imagen que proyectas como gobernante."
 granada.0051.opening:0 "[sender.Custom2('AppropriateGreeting', ROOT.Char)]"
 granada.0051.desc.host_likes_me:0 "Te invito cordialmente a unirte a mí en unas vacaciones en una de mis #italic residencias de recreo#! en [barony.GetNameNoTier] dentro de unos días, junto con otros miembros de mi corte. Te aseguro que mi villa es un lugar maravilloso donde descansar y disfrutar de la compañía de gente culta. Si tienes tiempo, me encantaría verte allí."
 granada.0051.desc.host_dislikes_me:0 "En unos días iré de vacaciones a una de mis #italic residencias de recreo#! en [barony.GetNameNoTier], junto con otros miembros de mi corte. Por desgracia, la cortesía me obliga a invitarte a nuestra excursión. Las #italic casas vacacionales#!, como sabes, son lugares donde la gente culta y refinada (no estoy seguro de si entras en esa categoría) se reúne para disfrutar de su mutua compañía. Si decides venir, compórtate y no nos avergüences."
 granada.0051.a:0 "¡Sería un honor veranear en vuestra #italic residencia de recreo#!"
 granada.0051.a.tooltip:0 "Veranear en la [munya|E] te ofrecerá la oportunidad de ganar varias bonificaciones según tus intereses y lo que el anfitrión haya planeado en el itinerario."
 granada.0051.b:0 "Lo agradezco, pero lamentablemente tengo otros compromisos."
 granada.0051.c:0 "¿En serio? ¡Que sepa que sus vacaciones son una pérdida de tiempo!"
 granada.0051.c.tooltip:0 "Enviar una carta a [sender.GetTitledFirstName] expresando tu desaprobación por sus frívolas vacaciones."
 granada.0052.opening:0 "[munya_vacation_rejector.Custom2('AppropriateGreeting', ROOT.Char)]"
 granada.0052.desc:0 "Deseo informaros de que declino vuestra invitación para veranear en vuestra #italic residencia de recreo#! en el campo. En primer lugar, me decepciona que parezcáis más interesado en diversiones frívolas que en vuestros deberes como [host.GetTitleAsNameNoTooltip]. En segundo lugar, tengo compromisos previos que atender, así que estoy bastante ocupado. Estoy seguro de que lo comprenderéis."
 granada.0052.a:0 "Puede que veamos las cosas de forma distinta, ¡pero me parece justo!"
 granada.0052.b:0 "¡Cómo se atreve [munya_vacation_rejector.GetSheHe] a rechazar mi invitación!"
 
 granada.0053.t:0 "Vacaciones pospuestas... indefinidamente"
 granada.0053.desc:0 "Me ha llegado la noticia de que [host.GetTitledFirstName] acaba de fallecer. Por lo tanto, las vacaciones que planeaba han sido canceladas. Los demás invitados y yo ya no necesitamos viajar a su #italic residencia de recreo#! por razones obvias."
 granada.0053.a:0 "¡Lamentables noticias!"
 
 granada.0054.t:0 "Vacaciones pospuestas"
 granada.0054.desc:0 "Me han informado de que [host.GetTitledFirstName] acaba de ser encarcelado. Tanto yo como el resto de invitados que planeábamos ir a su #italic residencia de recreo#! ya no estamos obligados a asistir."
 granada.0054.a:0 "Qué situación tan incómoda."
 
 granada.0055.t:0 "Vacaciones pospuestas"
 granada.0055.desc:0 "¡En lugar de irme de vacaciones a mi #italic residencia de recreo#!, resulta que mi destino son las mazmorras! Al haber sido encarcelado, debo cancelar mis planes. Espero salir de aquí pronto."
 granada.0055.a:0 "Tanto planear para nada."
