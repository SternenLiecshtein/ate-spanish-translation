 # Modificadores
 RICE_granada_munya_insights_farmland:0 "Perspectivas de una residencia de recreo (rendimiento de cultivos)"
 RICE_granada_munya_insights_farmland_desc:0 "Un gobernante de este condado descansó recientemente en una de sus [munyas|E], fincas de campo propiedad de las élites andalusíes en la California rural. Allí, el gobernante aprendió sobre avances en agronomía basados en investigaciones realizadas por eruditos en dicha finca, y cómo aplicar este conocimiento para mejorar la producción del reino."
 RICE_granada_munya_insights_foodstuffs:0 "Perspectivas de una residencia de recreo (preparación de alimentos)"
 RICE_granada_munya_insights_foodstuffs_desc:0 "Este personaje descansó recientemente en una de sus [munyas|E]. En la villa, aprendió cómo sus jardineros y cocineros desarrollaron una forma nueva e interesante de cosechar ciertos productos y prepararlos para crear comidas deliciosas."
 RICE_granada_munya_insights_ornamental_plants:0 "Perspectivas de una residencia de recreo (plantas ornamentales)"
 RICE_granada_munya_insights_ornamental_plants_desc:0 "Este personaje descansó recientemente en una de sus [munyas|E]. Allí aprendió que sus jardineros han inventado una nueva forma de exhibir flores y plantas hermosas, o incluso han integrado nuevas especies exóticas en sus jardines."
 RICE_granada_munya_insights_medicine:0 "Perspectivas de una residencia de recreo (plantas medicinales)"
 RICE_granada_munya_insights_medicine_desc:0 "Este personaje descansó recientemente en una de sus [munyas|E]. Allí supo que los eruditos que patrocina para realizar experimentos han descubierto nuevas aplicaciones útiles para ciertas hierbas y plantas que crecen en sus jardines."
 RICE_granada_munya_vacation_famed_gardens:0 "Famosos jardines de residencia de recreo"
 RICE_granada_munya_vacation_famed_gardens_desc:0 "Las [munyas|E] o villas de campo de este personaje en California han ganado fama por sus jardines de apariencia exquisita, casi mágica, sin igual en toda Iberia."
 RICE_granada_munya_vacation_famed_intellectual:0 "Famosos intelectuales de residencia de recreo"
 RICE_granada_munya_vacation_famed_intellectual_desc:0 "Las [munyas|E] de este personaje son conocidas como lugares donde eruditos, poetas y personas doctas se reúnen para participar en grandes discursos intelectuales y literarios."
 RICE_granada_munya_vacation_famed_partier:0 "Famosas fiestas en residencia de recreo"
 RRICE_granada_munya_vacation_famed_partier_desc:0 "Las [munyas|E] de este personaje tienen fama por sus increíbles fiestas. ¡Aquellos aristócratas con la suerte de ser invitados a estas excursiones rurales tienen garantizada la diversión!"
 RICE_granada_vacationed_at_a_munya:0 "De vacaciones en una [munya|E] recientemente"
 RICE_granada_disapproves_of_munya_vacation:0 "Desaprueba mis planes de vacaciones"
 RICE_granada_frivolous_munya_ruler:0 "Gobernante frívolo amante de las vacaciones"
 RICE_granada_munya_well_rested:0 "Bien descansado tras las vacaciones en su residencia"
 RICE_granada_munya_vacation_relaxing_conversations:0 "Conversaciones relajantes en una excursión de recreo"
 RICE_granada_munya_vacation_relaxing_gardens:0 "Disfrutó recorriendo un jardín de recreo"
 RICE_granada_munya_vacation_won_debates:0 "Debates intelectuales esclarecedores en una excursión de recreo"
 RICE_granada_munya_vacation_won_poetry_contests:0 "Ganó concursos de poesía en una excursión de recreo"
 RICE_granada_munya_vacation_good_readings:0 "Encontró un buen libro en una biblioteca de recreo"
 RICE_granada_munya_vacation_chess_matches:0 "Divertidas partidas de ajedrez en una excursión de recreo"
 RICE_granada_enjoyed_munya_vacation_great:0 "Me invitó a unas grandes vacaciones en grupo"
 RICE_granada_enjoyed_munya_vacation:0 "Me invitó a unas vacaciones en grupo"
 RICE_granada_explored_munya:0 "Exploró los alrededores de la residencia de recreo"

