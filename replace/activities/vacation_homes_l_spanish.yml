 RICE_granada_munya_vacation_private_food_log:0 "[CHARACTER.GetShortUIName|U] discutió la preparación de alimentos con su personal en la [munya|E]"
 RICE_granada_munya_vacation_private_plants_log_title:0 "Perspectivas botánicas"
 RICE_granada_munya_vacation_private_plants_log:0 "[CHARACTER.GetShortUIName|U] discutió sobre plantas ornamentales con su personal en la [munya|E]"
 RICE_granada_munya_vacation_private_medicine_log_title:0 "Perspectivas botánicas"
 RICE_granada_munya_vacation_private_medicine_log:0 "[CHARACTER.GetShortUIName|U] discutió sobre plantas medicinales con su personal en la [munya|E]"
 RICE_granada_munya_vacation_private_chill_log_title:0 "Día de no hacer nada"
 RICE_granada_munya_vacation_private_chill_log:0 "[CHARACTER.GetShortUIName|U] no hizo absolutamente nada en su [munya|E]; ¡debe estar muy relajado!"
