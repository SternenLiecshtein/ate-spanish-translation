 granada.0060.t:0 "Comienzan las vacaciones"
 granada.0060.desc:0 "Tras algunos preparativos, por fin he llegado a mi #italic residencia de recreo#! en el campo. Durante los próximos días, tendré toda la villa para mí solo para relajarme y disfrutar de la vida.\n\nPor supuesto, estar solo no significa que no pueda realizar actividades productivas. Quienes tienen el poder y la riqueza para poseer estas villas suelen patrocinar a eruditos locales para realizar experimentos botánicos y agronómicos. Por tanto, si quisiera, podría comprobar cómo progresan los proyectos que patrocino. Sería una grata sorpresa obtener nuevos conocimientos que me ayuden a gestionar mi reino o a impresionar a los demás.\n\nPor otro lado, quizá unas vacaciones deban ser solo para el puro descanso."
 granada.0060.a:0 "¿Qué hay de nuevo en las tierras de cultivo circundantes?"
 granada.0060.a.tooltip:0 "Elige esta opción para intentar obtener nuevos conocimientos sobre la gestión del reino y asuntos agrícolas."
 granada.0060.b:0 "Tengo curiosidad por ver qué traman mis jardineros y botánicos."
 granada.0060.b.tooltip:0 "Elige esta opción para intentar obtener nuevos conocimientos sobre cómo las plantas pueden beneficiarte personalmente."
 granada.0060.c:0 "Es momento de relajarse y no hacer nada estresante."
 granada.0060.c.tooltip:0 "Elige esta opción para perder mucho más [stress|E], pero a cambio de perder la oportunidad de obtener otras bonificaciones."

 granada.0061.t:0 "Fin de las vacaciones"
 granada.0061.desc:0 "Todo lo bueno tiene un final. Aunque he disfrutado de mi estancia en mi #italic residencia de recreo#! estos días, debo regresar a mis deberes como [ROOT.Char.GetTitleAsNameNoTooltip] de estas tierras.\n\nAun así, me alegra haber tenido la oportunidad de tomarme este respiro. Salir al campo de esta manera siempre rejuvenece el espíritu de [ROOT.Char.GetWomanMan], y ya espero con ansias la próxima ocasión."
 granada.0061.a:0 "Seguro que volveré más pronto que tarde."

 granada.0062.t:0 "Agricultura en mi residencia"
 granada.0062.desc:0 "Muchas #italic residencias de recreo#! como la mía funcionan también como plantaciones que producen desde deliciosas frutas y verduras hasta azúcar o seda bruta. Por ello, aunque paso gran parte del tiempo relajándome en la villa principal, me interesa ver cómo va el resto de la finca.\n\nLos capataces y algunos eruditos especializados en agronomía, a quienes contraté previamente, me acompañan mientras recorro los campos y huertos. Quizá debería preguntarles qué han aprendido recientemente. La información podría ser útil cuando regrese y ayudarme en mis responsabilidades como [ROOT.Char.GetTitleAsNameNoTooltip]."
 granada.0062.a:0 "Preguntar sobre el rendimiento y la producción de los cultivos"
 granada.0062.a.title:0 "¡Obtienes conocimientos sobre agricultura!"
 granada.0062.b:0 "Preguntar sobre formas de preparar los alimentos"
 granada.0062.b.title:0 "¡Obtienes conocimientos sobre cocina!"

 granada.0063.t:0 "Jardinería en mi residencia"
 granada.0063.desc:0 "Las #italic residencias de recreo#! en el campo suelen tener jardines considerables, y la mía no es una excepción. Flores, arbustos y árboles —tanto nativos de Iberia como exóticos de tierras lejanas— se disponen estéticamente junto a encantadores senderos, bancos y elementos acuáticos como fuentes y estanques.\n\nMe gusta disfrutar de mis jardines, pero también quiero ver qué hace mi personal. Los jardineros y botánicos no solo mantienen el lugar, sino que a veces experimentan para aprender más sobre estas plantas.\n\nDebería preguntarles si han descubierto algo interesante. La información podría serme útil para impresionar a otros o para aprovechar mejor los jardines de mi palacio principal."
 granada.0063.a:0 "Preguntar sobre nuevas tendencias de jardinería en Iberia"
 granada.0063.a.title:0 "¡Obtienes conocimientos sobre jardinería!"
 granada.0063.b:0 "Preguntar sobre las propiedades de estas plantas"
 granada.0063.b.title:0 "¡Obtienes conocimientos sobre hierbas y medicina!"

 granada.0064.t:0 "Relajación en mi residencia"
 granada.0064.desc:0 "Aunque hay muchas cosas interesantes que podría hacer, como discutir el estado de las tierras con mis capataces o investigar los experimentos botánicos, he venido principalmente por una razón: relajarme.\n\nHa sido un placer pasar los días sin hacer absolutamente nada, o al menos nada agotador. Disfruto de buenas comidas, duermo siestas generosas, paseo por el jardín o cabalgo por el campo, entregándome a placeres sencillos como la lectura de un pergamino."
 granada.0064.a:0 "La vida es bella."
 granada.0064.a.title:0 "¡Estás notablemente descansado!"
