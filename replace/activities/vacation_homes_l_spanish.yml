 activity_RICE_granada_munya_vacation_group:0 "Vacaciones en grupo en una residencia de recreo"
 activity_RICE_granada_munya_vacation_group_desc:0 "$activity_RICE_granada_munya_vacation_private_desc$"
 activity_RICE_granada_munya_vacation_group_selection_tooltip: "Ir de vacaciones a una [munya|E] con un grupo de personas."
 activity_RICE_granada_munya_vacation_group_host_desc: "\n$BULLET_WITH_TAB$ [prestige_i|E] [prestige|E]\n$BULLET_WITH_TAB$ Los invitados mejoran su [opinion|E] del anfitrión\n$BULLET_WITH_TAB$Pierdes [stress|E] ([stress_loss_i|E]) (aunque mucho menos que en unas vacaciones privadas)\n$BULLET_WITH_TAB$Otros beneficios como [character_modifiers|E] #P positivos#!"
 activity_RICE_granada_munya_vacation_group_guest_desc: "$activity_RICE_granada_munya_vacation_group_host_desc$"
 activity_RICE_granada_munya_vacation_group_province_desc: "\n#P ++ Posees una [munya|E] aquí, en la zona tranquila del campo donde no hay [holdings|E] importantes.#!\n\n#italic Esto permitirá perder más [stress|E] ([stress_loss_i|E]) en comparación con otros lugares.#!"
 activity_RICE_granada_munya_vacation_group_destination_selection: "$activity_RICE_granada_munya_vacation_group_province_desc$"
 activity_RICE_granada_munya_vacation_group_guest_help_text: "$activity_RICE_granada_munya_vacation_group$"
 activity_RICE_granada_munya_vacation_group_predicted_cost: "El coste de unas vacaciones en una [munya|E] depende de las [activity_options|E] que selecciones."
 activity_RICE_granada_munya_vacation_group_conclusion_desc: "La [GetActivityType( 'activity_RICE_granada_munya_vacation_group' ).GetName] ha terminado. ¡Ha sido una experiencia divertida para todos!"
 RICE_granada_munya_vacation_group_type: "Tipo de vacaciones"
 RICE_granada_munya_vacation_group_type_party: "Fiesta continua"
 RICE_granada_munya_vacation_group_type_party_desc: "$EFFECT_LIST_BULLET$ Gana [prestige|E] ([prestige_i|E]) al final de la [activity|E] además de otras bonificaciones\n$EFFECT_LIST_BULLET$ Posibilidad de ganar [GetModifier('RICE_granada_munya_vacation_famed_partier').GetNameWithTooltip] según tu [diplomacy|E] e [intrigue|E]\n\n#weak Varios aristócratas ricos reunidos en un lugar apartado, lejos de la civilización, con comida y bebida de sobra... ¡la cosa podría desmadrarse!#!"
 RICE_granada_munya_vacation_group_type_gardens: "Jardines y vistas"
 RICE_granada_munya_vacation_group_type_gardens_desc: "$EFFECT_LIST_BULLET$ Gana [prestige|E] ([prestige_i|E]) y [piety|E] ([piety_i|E]) (aunque la mitad que con otras opciones) al final de la [activity|E]\n$EFFECT_LIST_BULLET$ Posibilidad de ganar [GetModifier('RICE_granada_munya_vacation_famed_gardens').GetNameWithTooltip] según tu [diplomacy|E] y [stewardship|E]\n\n#weak Verdaderamente, estos hermosos viveros, invernaderos y terrazas no tienen parangón. ¡Podrían considerarse el paraíso en la tierra!#!"
 RICE_granada_munya_vacation_group_type_poetry: "Poetas e intelectuales"
 RICE_granada_munya_vacation_group_type_poetry_desc: "$EFFECT_LIST_BULLET$ Gana [piety|E] ([piety_i|E]) al final de la [activity|E] además de otras bonificaciones\n$EFFECT_LIST_BULLET$ Posibilidad de ganar [GetModifier('RICE_granada_munya_vacation_famed_intellectual').GetNameWithTooltip] según tu [diplomacy|E] y [learning|E]\n\n#weak Un gobernante que se rodea de gente creativa e inteligente debe de ser igual... o al menos lo intenta.#!"
 RICE_granada_munya_vacation_group_length: "$RICE_granada_munya_vacation_private_length$"
 RICE_granada_munya_vacation_group_length_short: "$RICE_granada_munya_vacation_private_length_short$"
 RICE_granada_munya_vacation_group_length_short_desc: "$EFFECT_LIST_BULLET$ Las vacaciones en la [munya|E] durarán #V 1#! semana\n$EFFECT_LIST_BULLET$ Las vacaciones largas aumentan el [prestige|E] o la [piety|E], y la pérdida de [stress|E].\n\n#weak Todo el mundo tiene una vida ocupada; para no importunar a nadie, estas serán unas vacaciones breves.#!"
 RICE_granada_munya_vacation_group_length_medium: "$RICE_granada_munya_vacation_private_length_medium$"
 RICE_granada_munya_vacation_group_length_medium_desc: "$EFFECT_LIST_BULLET$ Las vacaciones en la [munya|E] durarán #V 1#! mes\n$EFFECT_LIST_BULLET$ Las vacaciones largas aumentan las ganancias de recursos y la pérdida de [stress|E].\n\n#weak No hay mayor alegría que pasar una buena temporada relajándose en buena compañía.#!"
 RICE_granada_munya_vacation_group_length_long: "$RICE_granada_munya_vacation_private_length_long$"
 RICE_granada_munya_vacation_group_length_long_desc: "$EFFECT_LIST_BULLET$ Las vacaciones en la [munya|E] durarán #V 3#! meses\n$EFFECT_LIST_BULLET$ Las vacaciones largas maximizan los beneficios para ti y tus invitados.\n\n#weak ¡Olvida la responsabilidad! ¡Olvida el deber! ¿Quién no querría pasarlo bien el mayor tiempo posible?#!"
 RICE_granada_munya_vacation_group_vacation_phase: "$RICE_granada_munya_vacation_private_vacation_phase$"
 RICE_granada_munya_vacation_group_vacation_phase_desc: "$RICE_granada_munya_vacation_private_vacation_phase_desc$"
 RICE_granada_munya_vacation_group_merriment_intent_header: "Jolgorio:"
 RICE_granada_munya_vacation_group_merriment_intent: "Jolgorio"
 RICE_granada_munya_vacation_group_merriment_intent_desc: "Quieres pasarlo #italic realmente#! bien aquí. Perderás [stress|E] ([stress_loss_i|E]) adicional, especialmente si eres [GetTrait('gluttonous').GetName( GetNullCharacter )], [GetTrait('gregarious').GetName( GetNullCharacter )] o [GetTrait('lustful').GetName( GetNullCharacter )]."
 RICE_granada_munya_vacation_group_reputation_intent_header: "Reputación:"
 RICE_granada_munya_vacation_group_reputation_intent: "Reputación"
 RICE_granada_munya_vacation_group_reputation_intent_desc: "Quieres ser conocido como alguien divertido en estas salidas a la [munya|E]. Ganarás más [prestige|E] además de lo acumulado. Perderás [stress|E] ([stress_loss_i|E]) si eres [GetTrait('ambitious').GetName( GetNullCharacter )], [GetTrait('diligent').GetName( GetNullCharacter )] o [GetTrait('arrogant').GetName( GetNullCharacter )]."
 RICE_granada_munya_vacation_group_completed_log_title:0 "Vacaciones en residencia de recreo terminadas"
 RICE_granada_munya_vacation_group_completed_log:0 "Las vacaciones en grupo organizadas por [CHARACTER.GetShortUIName|U] en su [munya|E] de [PROVINCE.GetBaronyNameExplicitly] han terminado"
