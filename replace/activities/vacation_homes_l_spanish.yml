 RICE_granada_munya_vacation_private_completed_log:0 "Las vacaciones de [CHARACTER.GetShortUINamePossessive|U] en su [munya|E] de [PROVINCE.GetBaronyNameExplicitly] han terminado"
 RICE_granada_munya_vacation_private_farms_log_title:0 "Perspectivas agrícolas"
 RICE_granada_munya_vacation_private_farms_log:0 "[CHARACTER.GetShortUIName|U] discutió los rendimientos de los cultivos con su personal en la [munya|E]"
