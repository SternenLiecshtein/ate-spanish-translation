 activity_RICE_granada_munya_vacation_private:0 "Vacaciones privadas en una residencia de recreo"
 activity_RICE_granada_munya_vacation_private_desc:0 "Todo noble de California que se precie posee varias fincas de tipo [munya|E] en el campo. Estas villas son un lugar excelente para relajarse, ya sea en soledad o en compañía."
 activity_RICE_granada_munya_vacation_private_selection_tooltip: "Ir de vacaciones a una [munya|E] por tu cuenta."
 activity_RICE_granada_munya_vacation_private_host_desc: "\n$BULLET_WITH_TAB$Pierdes [stress|E] ([stress_loss_i|E]) (y mucho más en comparación con unas vacaciones en grupo)\n$BULLET_WITH_TAB$Otros beneficios como [character_modifiers|E] #P positivos#!"
 activity_RICE_granada_munya_vacation_private_guest_desc: "$activity_RICE_granada_munya_vacation_private_host_desc$"
 activity_RICE_granada_munya_vacation_private_province_desc: ""
 activity_RICE_granada_munya_vacation_countryside_province_desc:0 "\n#P ++ Posees una [munya|E] aquí, en una zona tranquila del campo sin [holdings|E] importantes.#!\n\n#italic Esto permitirá perder [stress|E] ([stress_loss_i|E]) adicional en comparación con otros lugares.#!"
 activity_RICE_granada_munya_vacation_private_destination_selection: "$activity_RICE_granada_munya_vacation_private_province_desc$"
 activity_RICE_granada_munya_vacation_private_guest_help_text: "$activity_RICE_granada_munya_vacation_private$"
 activity_RICE_granada_munya_vacation_private_predicted_cost: "El coste de unas vacaciones en una [munya|E] depende de las [activity_options|E] que selecciones."
 activity_RICE_granada_munya_vacation_private_conclusion_desc: "Las [GetActivityType( 'activity_RICE_granada_munya_vacation_private' ).GetName] han terminado. ¡El descanso llegó a su fin y toca volver a los rigores de la vida!"
 RICE_granada_munya_vacation_private_type: "Tipo de visita"
 RICE_granada_munya_vacation_private_type_leisure: "Ocio"
 RICE_granada_munya_vacation_private_type_leisure_desc: "$EFFECT_LIST_BULLET$ Aprovecha esta oportunidad para descansar todo lo posible en tu [munya|E] en la paz del campo.\n$EFFECT_LIST_BULLET$ Pierde más [stress|E] ([stress_loss_i|E]) que con las otras opciones\n\n#weak ¿Quién en su sano juicio querría trabajar durante sus vacaciones personales? ¡Es el momento de ser tan perezoso como sea posible!#!"
 RICE_granada_munya_vacation_private_type_agriculture: "Agricultura"
 RICE_granada_munya_vacation_private_type_agriculture_desc: "$EFFECT_LIST_BULLET$ Las [munyas|E] son lugares clave para el avance de la ciencia agrícola.\n$EFFECT_LIST_BULLET$ Gana [experience|E] en el estilo de vida de [stewardship_lifestyle|E] o [learning_lifestyle|E]\n$EFFECT_LIST_BULLET$ Posibilidad de ganar un [character_modifier|E] #P beneficioso#! relacionado con la agricultura\n\n#weak Hay expertos en agronomía que pueden ofrecer a un gobernante sabio y previsor consejos útiles sobre cómo mantener a su pueblo bien alimentado y aumentar la prosperidad del reino.#!"
 RICE_granada_munya_vacation_private_type_botany: "Botánica"
 RICE_granada_munya_vacation_private_type_botany_desc: "$EFFECT_LIST_BULLET$ Es un momento excelente para ver qué han estado haciendo tus jardineros en tu [munya|E].\n$EFFECT_LIST_BULLET$ Gana [experience|E] en el estilo de vida de [diplomacy_lifestyle|E] o [intrigue_lifestyle|E]\n$EFFECT_LIST_BULLET$ Posibilidad de ganar un [character_modifier|E] #P beneficioso#! relacionado con la botánica\n\n#weak El noble o la noble cuyos jardineros produzcan las flores y plantas más intrincadas y hermosas en sus jardines de la [munya|E] seguramente ganará mucho prestigio y respeto.#!"
 RICE_granada_munya_vacation_private_length: "Duración de las vacaciones"
 RICE_granada_munya_vacation_private_length_short: "Corta"
 RICE_granada_munya_vacation_private_length_short_desc: "$EFFECT_LIST_BULLET$ Las vacaciones en la [munya|E] durarán #V 1#! semana\n$EFFECT_LIST_BULLET$ Cuanto más duren las vacaciones, más [stress|E] ([stress_loss_i|E]) perderéis tú y tus invitados.\n\n#weak Un rápido respiro de los problemas del mundo es todo lo que puedes permitirte, pero sin duda lo atesorarás.#!"
 RICE_granada_munya_vacation_private_length_medium: "Media"
 RICE_granada_munya_vacation_private_length_medium_desc: "$EFFECT_LIST_BULLET$ Las vacaciones en la [munya|E] durarán #V 1#! mes\n$EFFECT_LIST_BULLET$ Cuanto más duren las vacaciones, más [stress|E] ([stress_loss_i|E]) perderéis tú y tus invitados.\n\n#weak Aunque eventualmente debas regresar a tus deberes, no hay nada de malo en unas vacaciones prolongadas, dentro de lo razonable.#!"
 RICE_granada_munya_vacation_private_length_long: "Larga"
 RICE_granada_munya_vacation_private_length_long_desc: "$EFFECT_LIST_BULLET$ Las vacaciones en la [munya|E] durarán #V 3#! meses\n$EFFECT_LIST_BULLET$ Cuanto más duren las vacaciones, más [stress|E] ([stress_loss_i|E]) perderéis tú y tus invitados.\n\n#weak A veces, uno solo necesita alejarse de todo el mayor tiempo posible. Este podría ser uno de esos momentos.#!"
 RICE_granada_munya_vacation_private_vacation_phase: "Vacaciones"
 RICE_granada_munya_vacation_private_vacation_phase_desc: "Es el momento de relajarse y olvidar las preocupaciones del mundo."
 RICE_granada_munya_vacation_private_relaxation_intent_header: "Relajación:"
 RICE_granada_munya_vacation_private_relaxation_intent: "Relajación"
 RICE_granada_munya_vacation_private_relaxation_intent_desc: "Te centrarás en disfrutar. Tienes garantizado perder aún más [stress|E] ([stress_loss_i|E]), especialmente si eres [GetTrait('shy').GetName( GetNullCharacter )] o [GetTrait('lazy').GetName( GetNullCharacter )]."
 RICE_granada_munya_vacation_private_reflection_intent_header: "Reflexión:"
 RICE_granada_munya_vacation_private_reflection_intent: "Reflexión"
 RICE_granada_munya_vacation_private_reflection_intent_desc: "Deseas contemplarte a ti mismo y al mundo que te rodea. Ganarás [experience|E] en tu [lifestyle|E] (además de otras ganancias) y tendrás la oportunidad de aumentar ligeramente una [skill|E] al azar. También perderás [stress|E] ([stress_loss_i|E]) si eres [GetTrait('diligent').GetName( GetNullCharacter )]."
 RICE_granada_munya_vacation_private_exploration_intent_header: "Exploración:"
 RICE_granada_munya_vacation_private_exploration_intent: "Exploración"
 RICE_granada_munya_vacation_private_exploration_intent_desc: "Sin nadie que te moleste, puedes ver los lugares de interés locales a tu propio ritmo. Ganarás #V 100#! de [prestige_i|E] y el [modifier|E] [GetModifier('RICE_granada_explored_munya').GetNameWithTooltip] al final de la [activity|E]. También perderás [stress|E] ([stress_loss_i|E]) si eres [GetTrait('brave').GetName( GetNullCharacter )]."
